const STORAGE_KEY = "homeFlowV1Data";
const PEOPLE = ["Carolyn","Adam","Shared","Unassigned"];

let state = loadState();
let selectedId = null;

function loadState(){
  try{
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored){
      const parsed = JSON.parse(stored);
      if(Array.isArray(parsed.cards)) return parsed;
    }
  }catch(e){}
  return {version:1, cards:STARTER_DATA, categories:[]};
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function esc(s=""){
  return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}
function uid(){ return "custom-"+Date.now()+"-"+Math.random().toString(36).slice(2,8); }
function now(){ return new Date().toISOString(); }
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block";
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.style.display="none",2200);
}
function categories(){
  return [...new Set(state.cards.filter(c=>!c.deleted).map(c=>c.category||"Other"))].sort((a,b)=>a.localeCompare(b));
}
function populateCategories(){
  const sel=document.getElementById("categoryFilter"), current=sel.value;
  sel.innerHTML='<option value="">All categories</option>'+categories().map(c=>`<option>${esc(c)}</option>`).join("");
  sel.value=current;
}
function filteredCards(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const owner=document.getElementById("ownerFilter").value;
  const category=document.getElementById("categoryFilter").value;
  const view=document.getElementById("viewFilter").value;
  return state.cards.filter(c=>{
    if(view==="active" && c.deleted) return false;
    if(view==="trash" && !c.deleted) return false;
    if(owner && c.owner!==owner) return false;
    if(category && c.category!==category) return false;
    if(q){
      const hay=[c.title,c.originalName,c.category,c.owner,c.purpose,c.minimum,c.anticipate,c.conceptualize,c.plan,c.execute,c.closeLoop,c.notes].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(a.category||"").localeCompare(b.category||"") || (a.title||"").localeCompare(b.title||""));
}
function renderSummary(){
  const active=state.cards.filter(c=>!c.deleted);
  const counts={Carolyn:0,Adam:0,Shared:0,Unassigned:0};
  active.forEach(c=>counts[c.owner]=(counts[c.owner]||0)+1);
  document.getElementById("summary").innerHTML=[
    ["Total",active.length],["Carolyn",counts.Carolyn],["Adam",counts.Adam],["Shared",counts.Shared],["Unassigned",counts.Unassigned]
  ].map(([label,n])=>`<div class="stat"><strong>${n}</strong><span>${label}</span></div>`).join("");
}
function renderList(){
  populateCategories(); renderSummary();
  const cards=filteredCards(), view=document.getElementById("viewFilter").value;
  document.getElementById("trashNote").classList.toggle("hidden",view!=="trash");
  document.getElementById("resultCount").textContent=`${cards.length} ${view==="trash"?"deleted":"active"} responsibilities`;
  const list=document.getElementById("cardList");
  if(!cards.length){ list.innerHTML='<div class="detail-empty">No responsibilities match these filters.</div>'; return; }
  list.innerHTML=cards.map(c=>`
    <div class="card-row ${c.id===selectedId?"active":""}" data-id="${esc(c.id)}">
      <div>
        <div class="card-title">${esc(c.title||"Untitled")}</div>
        <div class="meta">${esc(c.category||"Other")}${c.originalName && c.originalName!==c.title ? ` · originally “${esc(c.originalName)}”`:""}</div>
      </div>
      <select class="field row-owner" data-owner-id="${esc(c.id)}" aria-label="Responsible person for ${esc(c.title)}">
        ${PEOPLE.map(p=>`<option ${p===c.owner?"selected":""}>${p}</option>`).join("")}
      </select>
    </div>`).join("");
  list.querySelectorAll(".card-row").forEach(el=>el.addEventListener("click",(e)=>{
    if(e.target.classList.contains("row-owner")) return;
    selectCard(el.dataset.id);
  }));
  list.querySelectorAll(".row-owner").forEach(sel=>sel.addEventListener("change",(e)=>{
    e.stopPropagation();
    updateCard(sel.dataset.ownerId,{owner:sel.value});
    if(selectedId===sel.dataset.ownerId) renderDetail();
    toast(`Owner changed to ${sel.value}`);
  }));
}
function selectCard(id){ selectedId=id; renderList(); renderDetail(); document.getElementById('detailPanel').classList.add('open'); }
function updateCard(id, patch){
  const c=state.cards.find(x=>x.id===id); if(!c)return;
  Object.assign(c,patch,{updatedAt:now()}); saveState(); renderList();
}
function renderDetail(){
  const panel=document.getElementById("detailPanel");
  const c=state.cards.find(x=>x.id===selectedId);
  if(!c){ panel.classList.remove('open'); panel.innerHTML='<div class="detail-empty">Select a responsibility to view or edit it.</div>'; return; }
  const deleted=c.deleted;
  panel.innerHTML=`
  <div class="detail-form">
   <div class="detail-top">
    <div>
      <h2>${esc(c.title)}</h2>
      <div class="small">${esc(c.source||"Custom")}${c.originalName?` · Original: ${esc(c.originalName)}`:""}</div>
    </div>
    <button class="detail-close" id="closeDetailBtn" aria-label="Close">×</button>
   </div>
   <label>Responsibility name</label>
   <input class="field" data-field="title" value="${esc(c.title)}" ${deleted?"disabled":""}>
   <div class="grid2">
    <div><label>Category</label><input class="field" data-field="category" value="${esc(c.category||"")}" ${deleted?"disabled":""}></div>
    <div><label>Owner</label>
      <select class="field" data-field="owner" ${deleted?"disabled":""}>
       ${PEOPLE.map(p=>`<option ${p===c.owner?"selected":""}>${p}</option>`).join("")}
      </select>
    </div>
   </div>
   <label>Backup owner(s)</label>
   <input class="field" data-field="backupOwners" value="${esc((c.backupOwners||[]).join(", "))}" placeholder="Example: Adam, Carolyn" ${deleted?"disabled":""}>
   <div class="section-title">Guidance</div>
   <label>Purpose / definition</label><textarea class="field" data-field="purpose" ${deleted?"disabled":""}>${esc(c.purpose||"")}</textarea>
   <label>Minimum Standard</label><textarea class="field" data-field="minimum" ${deleted?"disabled":""}>${esc(c.minimum||"")}</textarea>
   <label>Anticipate</label><textarea class="field" data-field="anticipate" ${deleted?"disabled":""}>${esc(c.anticipate||"")}</textarea>
   <label>Conceptualize</label><textarea class="field" data-field="conceptualize" ${deleted?"disabled":""}>${esc(c.conceptualize||"")}</textarea>
   <label>Plan</label><textarea class="field" data-field="plan" ${deleted?"disabled":""}>${esc(c.plan||"")}</textarea>
   <label>Execute</label><textarea class="field" data-field="execute" ${deleted?"disabled":""}>${esc(c.execute||"")}</textarea>
   <label>Close the Loop</label><textarea class="field" data-field="closeLoop" ${deleted?"disabled":""}>${esc(c.closeLoop||"")}</textarea>
   <label>Household notes</label><textarea class="field" data-field="notes" ${deleted?"disabled":""}>${esc(c.notes||"")}</textarea>
   <div class="inline-actions">
    ${deleted
      ? `<button class="btn primary" id="restoreBtn">Restore</button><button class="btn danger" id="permanentBtn">Permanently delete</button>`
      : `<button class="btn" id="duplicateBtn">Duplicate</button><button class="btn danger" id="deleteBtn">Delete</button>`}
   </div>
  </div>`;
  document.getElementById("closeDetailBtn").onclick=()=>{selectedId=null;panel.classList.remove("open");renderList();};
  panel.onclick=(e)=>{ if(e.target===panel){selectedId=null;panel.classList.remove("open");renderList();} };
  if(!deleted){
    panel.querySelectorAll("[data-field]").forEach(el=>{
      const event=el.tagName==="TEXTAREA"||el.tagName==="INPUT"?"input":"change";
      el.addEventListener(event,()=>{
        let val=el.value;
        if(el.dataset.field==="backupOwners") val=val.split(",").map(s=>s.trim()).filter(Boolean);
        updateCard(c.id,{[el.dataset.field]:val});
        if(el.dataset.field==="title") panel.querySelector("h2").textContent=val||"Untitled";
      });
    });
    document.getElementById("duplicateBtn").onclick=()=>duplicateCard(c.id);
    document.getElementById("deleteBtn").onclick=()=>confirmDelete(c.id);
  }else{
    document.getElementById("restoreBtn").onclick=()=>{updateCard(c.id,{deleted:false}); toast("Responsibility restored"); renderDetail();};
    document.getElementById("permanentBtn").onclick=()=>confirmPermanentDelete(c.id);
  }
}
function addCard(){
  const c={id:uid(),source:"Custom",originalName:"",title:"New Responsibility",category:"Custom",owner:"Unassigned",backupOwners:[],
    purpose:"",minimum:"",anticipate:"",conceptualize:"",plan:"",execute:"",closeLoop:"",notes:"",deleted:false,createdAt:now(),updatedAt:now()};
  state.cards.unshift(c); saveState(); selectedId=c.id;
  document.getElementById("viewFilter").value="active"; renderList(); renderDetail();
  setTimeout(()=>{const i=document.querySelector('[data-field="title"]'); if(i){i.focus();i.select();}},50);
}
function duplicateCard(id){
  const src=state.cards.find(c=>c.id===id); if(!src)return;
  const copy=JSON.parse(JSON.stringify(src)); copy.id=uid(); copy.title=src.title+" (Copy)"; copy.source="Custom"; copy.originalName="";
  copy.createdAt=now(); copy.updatedAt=now(); state.cards.unshift(copy); saveState(); selectedId=copy.id; renderList(); renderDetail(); toast("Responsibility duplicated");
}
function showModal(title,body,onConfirm,confirmText="Confirm",danger=false){
  const host=document.getElementById("modalHost");
  host.innerHTML=`<div class="modal-backdrop"><div class="modal"><h2>${esc(title)}</h2><div>${body}</div><div class="buttons"><button class="btn" id="cancelModal">Cancel</button><button class="btn ${danger?"danger":"primary"}" id="confirmModal">${esc(confirmText)}</button></div></div></div>`;
  document.getElementById("cancelModal").onclick=()=>host.innerHTML="";
  document.getElementById("confirmModal").onclick=()=>{host.innerHTML="";onConfirm();};
}
function confirmDelete(id){
  const c=state.cards.find(x=>x.id===id);
  showModal("Delete responsibility",`Move <strong>${esc(c.title)}</strong> to Trash? You can restore it later.`,()=>{
    updateCard(id,{deleted:true}); selectedId=null; renderList(); renderDetail(); toast("Moved to Trash");
  },"Move to Trash",true);
}
function confirmPermanentDelete(id){
  const c=state.cards.find(x=>x.id===id);
  showModal("Permanently delete",`This permanently removes <strong>${esc(c.title)}</strong> from this app and cannot be undone unless you have an exported backup.`,()=>{
    state.cards=state.cards.filter(x=>x.id!==id); saveState(); selectedId=null; renderList(); renderDetail(); toast("Permanently deleted");
  },"Delete permanently",true);
}
function exportData(){
  const payload={app:"Home Flow",version:1,exportedAt:now(),cards:state.cards};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`home-flow-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href);
}
function importData(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      let cards=null;
      if(Array.isArray(data.cards)) cards=data.cards;
      else if(data.state && typeof data.state==="object"){
        // Import legacy Home Flow backup.
        cards=STARTER_DATA.map(c=>{
          const key=`${c.category}::${c.originalName}`;
          const old=data.state[key];
          return old ? {...c,title:old.title||c.title,owner:old.owner||c.owner,backupOwners:old.backup||[],
            minimum:old.minimum||"",anticipate:old.anticipate||"",conceptualize:old.conceptualize||"",
            plan:old.plan||"",execute:old.execute||"",closeLoop:old.closeLoop||"",notes:old.notes||""} : c;
        });
      } else if(Array.isArray(data.cards)===false && Array.isArray(data.lists) && Array.isArray(data.cards)) cards=data.cards;
      if(!cards) throw new Error("Unsupported file");
      showModal("Replace current data",`Importing will replace the data currently stored in this browser. Export a backup first if you may need it.`,()=>{
        state={version:1,cards}; saveState(); selectedId=null; renderList(); renderDetail(); toast("Import complete");
      },"Import and replace",true);
    }catch(e){ alert("That file could not be imported. Please select a Home Flow backup JSON file."); }
  };
  reader.readAsText(file);
}
function clearFilters(){
  document.getElementById("search").value=""; document.getElementById("ownerFilter").value="";
  document.getElementById("categoryFilter").value=""; renderList();
}
document.getElementById("addBtn").onclick=addCard;
document.getElementById("exportBtn").onclick=exportData;
document.getElementById("importBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value="";};
document.getElementById("printBtn").onclick=()=>window.print();
document.addEventListener("keydown",e=>{if(e.key==="Escape"){selectedId=null;document.getElementById("detailPanel").classList.remove("open");renderList();}});
document.getElementById("clearFiltersBtn").onclick=clearFilters;
["search","ownerFilter","categoryFilter","viewFilter"].forEach(id=>{
 document.getElementById(id).addEventListener(id==="search"?"input":"change",()=>{selectedId=null;renderList();renderDetail();});
});
renderList(); renderDetail();
</script>
</body>
</html>
