<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Flow</title>
<style>
:root{
  --bg:#f5f3ef; --panel:#ffffff; --ink:#2d2a26; --muted:#706a63;
  --line:#ddd7cf; --accent:#3d6d66; --accent2:#e8f1ef; --danger:#a54444;
  --shadow:0 8px 24px rgba(45,42,38,.08); --radius:16px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
header{position:sticky;top:0;z-index:20;background:rgba(245,243,239,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.header-inner{max-width:1400px;margin:auto;padding:16px 22px;display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.brand h1{font-size:1.55rem;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:.9rem}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 12px;border-radius:10px}
.btn:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.danger{color:var(--danger);border-color:#d9b6b6}
main{max-width:1400px;margin:auto;padding:22px}
.toolbar{display:grid;grid-template-columns:minmax(240px,2fr) repeat(3,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.field,.toolbar input,.toolbar select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.stat strong{display:block;font-size:1.35rem}.stat span{font-size:.82rem;color:var(--muted)}
.layout{display:block}
.list-panel,.detail-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.list-head{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.list{max-height:calc(100vh - 290px);overflow:auto}
.card-row{padding:14px 16px;border-bottom:1px solid #eee9e2;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.card-row:hover{background:#faf9f7}.card-row.active{background:var(--accent2)}
.card-title{font-weight:700}.meta{color:var(--muted);font-size:.82rem;margin-top:4px}
.owner-pill{border-radius:999px;padding:5px 9px;font-size:.78rem;white-space:nowrap;background:#eee}.row-owner{width:125px;padding:7px 9px;font-size:.82rem}
.owner-Carolyn{background:#f3e7ee}.owner-Adam{background:#e4edf6}.owner-Shared{background:#e5f1e9}.owner-Unassigned{background:#efede9}
.detail-panel{
  position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;padding:20px;overflow:auto
}
.detail-panel.open{display:flex}
.detail-panel .detail-form{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);width:min(760px,100%);max-height:90vh;overflow:auto;padding:18px
}
.detail-close{
  border:1px solid var(--line);background:#fff;border-radius:999px;
  width:34px;height:34px;font-size:1.15rem;line-height:1
}
.detail-empty{padding:50px 30px;text-align:center;color:var(--muted)}
.detail-form{padding:18px}
.detail-top{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:12px}
.detail-top h2{margin:0;font-size:1.25rem}
.small{font-size:.8rem;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{font-size:.8rem;font-weight:700;display:block;margin:11px 0 5px}
textarea{min-height:74px;resize:vertical}
.section-title{margin-top:18px;padding-top:15px;border-top:1px solid var(--line);font-size:.9rem;color:var(--accent);font-weight:700}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}
.hidden{display:none!important}
.toast{position:fixed;right:20px;bottom:20px;background:#2f342f;color:white;padding:12px 15px;border-radius:10px;box-shadow:var(--shadow);display:none;z-index:50}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;max-width:560px;width:100%;border-radius:16px;padding:20px;box-shadow:var(--shadow)}
.modal h2{margin-top:0}.modal .buttons{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.trash-note{padding:12px 16px;background:#fff4e8;border-bottom:1px solid #eed7be;color:#6d4b2c;font-size:.87rem}
@media(max-width:1000px){
 .layout{display:block}.list{max-height:none}
 .toolbar{grid-template-columns:1fr 1fr}.summary{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:620px){
 main{padding:12px}.header-inner{padding:12px}.toolbar{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}
 .grid2{grid-template-columns:1fr}.actions{width:100%}.actions .btn{flex:1}
}
@media print{
 header,.toolbar,.inline-actions,.detail-panel,.list-head button{display:none!important}
 body,main{background:white;padding:0}.layout{display:block}.list-panel{border:0;box-shadow:none}.list{max-height:none}
 .card-row{break-inside:avoid}.summary{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>
<header>
 <div class="header-inner">
  <div class="brand">
   <h1>Home Flow</h1>
   <p>Carolyn & Adam's household responsibilities</p>
  </div>
  <div class="actions">
   <button class="btn primary" id="addBtn">+ Add responsibility</button>
   <button class="btn" id="exportBtn">Export backup</button>
   <button class="btn" id="importBtn">Import</button>
   <button class="btn" id="printBtn">Print</button>
   <input id="fileInput" type="file" accept=".json" class="hidden">
  </div>
 </div>
</header>

<main>
 <div class="toolbar">
  <input id="search" placeholder="Search responsibilities, notes, or guidance…">
  <select id="ownerFilter">
   <option value="">All owners</option>
   <option>Carolyn</option><option>Adam</option><option>Shared</option><option>Unassigned</option>
  </select>
  <select id="categoryFilter"><option value="">All categories</option></select>
  <select id="viewFilter">
   <option value="active">Active responsibilities</option>
   <option value="trash">Trash</option>
  </select>
 </div>

 <div class="summary" id="summary"></div>

 <div class="layout">
  <section class="list-panel">
   <div id="trashNote" class="trash-note hidden">Deleted responsibilities remain here until you restore or permanently delete them.</div>
   <div class="list-head">
    <strong id="resultCount">Responsibilities</strong>
    <button class="btn" id="clearFiltersBtn">Clear filters</button>
   </div>
   <div class="list" id="cardList"></div>
  </section>

  <aside class="detail-panel" id="detailPanel">
   <div class="detail-empty">Select a responsibility to view or edit it.</div>
  </aside>
 </div>
</main>

<div class="toast" id="toast"></div>
<div id="modalHost"></div>

<script>
const STARTER_DATA = [{"id": "fp-6509fa9bc770dc692d85a87e", "source": "Fair Play template", "originalName": "Adult Friendships (Player 1)", "title": "TBD", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Each of you gets this card because friends are key to your health, happiness, resilience, career, and sanity. Whether it’s grabbing coffee after school drop-off, a dinner date, a networking event, or a weekend trip away, nurturing friendships will reap huge dividends. Friendships are not a luxury you’ll make time for in the future so use this card guilt-free now. No partner resentment allowed either, as a girls’ or guys’ night out is about so much more than a cocktail. It’s about cultivating relationships that will support and sustain you along with boosting the health of your marriage.", "minimum": "Protected personal time and relationships receive enough attention to support health, identity, connection, and sustainable family participation.", "anticipate": "Notice signs of depletion, isolation, scheduling conflicts, and opportunities that require advance planning.", "conceptualize": "Decide what form of time, support, activity, or connection would be restorative and realistic.", "plan": "Reserve time, arrange coverage, budget as needed, and communicate the plan without waiting for a crisis.", "execute": "Use the protected time and complete any arrangements or communication involved.", "closeLoop": "Return agreed responsibilities to normal, reflect on whether the need was met, and schedule the next opportunity when useful.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6509fda908f5fe42fb79d38e", "source": "Fair Play template", "originalName": "Adult Friendships (Player 2)", "title": "TBD", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Each of you gets this card because friends are key to your health, happiness, resilience, career, and sanity. Whether it’s grabbing coffee after school drop-off, a dinner date, a networking event, or a weekend trip away, nurturing friendships will reap huge dividends. Friendships are not a luxury you’ll make time for in the future so use this card guilt-free now. No partner resentment allowed either, as a girls’ or guys’ night out is about so much more than a cocktail. It’s about cultivating relationships that will support and sustain you along with boosting the health of your marriage.", "minimum": "Protected personal time and relationships receive enough attention to support health, identity, connection, and sustainable family participation.", "anticipate": "Notice signs of depletion, isolation, scheduling conflicts, and opportunities that require advance planning.", "conceptualize": "Decide what form of time, support, activity, or connection would be restorative and realistic.", "plan": "Reserve time, arrange coverage, budget as needed, and communicate the plan without waiting for a crisis.", "execute": "Use the protected time and complete any arrangements or communication involved.", "closeLoop": "Return agreed responsibilities to normal, reflect on whether the need was met, and schedule the next opportunity when useful.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6509fdce34cc4389a5a1faf2", "source": "Fair Play template", "originalName": "Aging/Ailing Parent", "title": "Aging/Ailing Parent", "category": "Wild", "owner": "Adam", "backupOwners": [], "purpose": "Sandwich generation, anyone? From managing medications, meals, and doctors’ appointments to making visiting a priority, caring for an aging/ailing parent can be all-consuming, not to mention the emotional challenge of this inevitable but often unexpected new caregiver role. Even if you outsource some of the work or can afford in-home or assisted-living support, CPEing this card requires all the love in your heart and a good chunk of your time.", "minimum": "The parent's essential health, safety, legal, financial, and emotional needs are addressed without leaving critical matters unowned.", "anticipate": "Monitor health changes, appointments, medications, living needs, benefits, legal documents, caregiver strain, and emergencies.", "conceptualize": "Assess risks, preferences, family roles, professional support, cost, and the appropriate level of care.", "plan": "Coordinate appointments, records, transportation, communication, respite, legal work, and contingency plans.", "execute": "Provide or arrange care, attend meetings, make authorized decisions, and communicate with family and providers.", "closeLoop": "Confirm care was delivered, update records and plans, follow up on claims or referrals, and reassess capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6509fde74d83fe655e7904ad", "source": "Fair Play template", "originalName": "Auto", "title": "Auto & Auto Insurance", "category": "Out", "owner": "Adam", "backupOwners": [], "purpose": "Do you know what happens if you don’t put the new registration sticker on your car? You get a ticket that could have easily been avoided, that’s what. This cardholder handles all items relating to your family’s car(s), including putting that sticker on in a timely manner, paying for that darn ticket, renewing insurance, handling maintenance, getting car washes, regularly filling up with gas, and getting the oil checked so that you feel safe and secure in the family car.", "minimum": "Auto remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that auto needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6509ffd18c0d3f1ac2e4cebc", "source": "Fair Play template", "originalName": "Bathing & Grooming (Kids)", "title": "Bathing & Grooming (Kids)", "category": "Caregiving", "owner": "Adam", "backupOwners": [], "purpose": "The nature of this cardholder’s responsibilities changes depending on your kids’ ages, but the point is that your kids need to brush their teeth, bathe, wash their faces, cut their nails, and brush their hair. Over and over again. Tip! Pay attention to your kids’ developing needs. If you notice a suspicious scent every time your teenager is within five feet, it’s probably time for this CPEer to buy deodorant and make sure your kid knows how often to use it. Daily!", "minimum": "Clothing, footwear, grooming, and hygiene needs are met with appropriate fit, condition, supplies, and timing.", "anticipate": "Notice growth, wear, weather changes, special events, hygiene needs, and supplies that are running low.", "conceptualize": "Decide what is needed, what can be reused, repaired, donated, or replaced, and what standards apply.", "plan": "Schedule appointments, create purchase lists, set a budget, and gather needed sizes or products.", "execute": "Purchase, organize, wash, groom, attend appointments, and dispose of or donate outdated items.", "closeLoop": "Confirm fit and usability, process returns, restock supplies, and update sizes or preferences.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a0517e8669101fa3ed74e", "source": "Fair Play template", "originalName": "Bedtime Routine (Kids)", "title": "Bedtime Routine (Kids)", "category": "Caregiving", "owner": "Shared", "backupOwners": [], "purpose": "It can be super rewarding when nighttime includes bonding over the day’s events, cuddling like nobody’s business, or lying quietly with your precious child. Not so much when this routine becomes a battle over bedtime. Pleas for just one more glass of water or five more minutes of reading can test your patience and fortitude (no wonder Go the F**k to Sleep is a bestselling book). While one person needs to take the CPE lead, the other is not home free (i.e., this is not an ideal window of time for you to hit the couch and start flipping channels). Your collaboration is encouraged. Try this: One partner holds the “bathing and grooming (kids)” card to get the party started while the other is responsible for jammies, stories, and lights out. Keep in mind that this routine won’t last forever. Before you know it, your babies will be teenagers and you’ll be going to sleep long before them.", "minimum": "Bedtime Routine is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by bedtime routine before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for bedtime routine.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a057c0e83c75ef202a29b", "source": "Fair Play template", "originalName": "Birth Control", "title": "TBD", "category": "Caregiving", "owner": "Unassigned", "backupOwners": [], "purpose": "Why is this a separate card instead of being a component of self-care or medical? Because the woman should not be the she-fault cardholder, meaning either of you can claim this card. If having a baby is not on you and your partner’s agenda, this cardholder will research contraception options, which may include buying condoms, the pill, an IUD, or scheduling a vasectomy. (Not sure if being too tired to have sex at all is considered a form of birth control? Ask around.)", "minimum": "Birth Control is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by birth control before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for birth control.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a0648e1b1168db25fe062", "source": "Fair Play template", "originalName": "Birthday Celebrations (Other Kids)", "title": "Birthday Celebrations (Other Kids)", "category": "Out", "owner": "Carolyn", "backupOwners": [], "purpose": "From RSVPing to buying presents, the birthday party circuit for your kids is riddled with opportunities for missteps . . . like when you’re already out the door and realize it’s a princess dress-up theme. Oops. And why didn’t anyone warn you how many weekend hours you’d be spending at other kids’ birthday parties chitchatting with parents you hardly know? Do a happy dance if siblings are invited so you can have two kids in the same place at the same time. Note! If you have two or more kids who have to be at separate birthday celebrations, you and your partner can both hold this card separately. A Kid Split means you both CPE the same card at the same time but for separate kids. See page 267 for more about splitting cards. Post Note! This card pairs with the “transportation (kids)” and “gifts (VIPs)” cards. Meaning, if you RSVP’d yes to the birthday party at the trampoline park, you are responsible for getting your son there (gift in hand) and picking him up afterward.", "minimum": "Birthday Celebrations (Other Kids) is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by birthday celebrations (other kids) before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for birthday celebrations (other kids).", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a06ea2b6c40e38c1cf50d", "source": "Fair Play template", "originalName": "Birthday Celebrations (Kids)", "title": "Birthday Celebrations (Kids)", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Have you ever tried shoving a dozen balloons into the trunk of your car? It’s like playing a game of whack-a-mole but you get no prize. How about copying and pasting email addresses for the whole class into your online invitation? Time suck. These are just illustrations of the many tasks you’ll handle when", "minimum": "Did the celebration honor your child in a way that felt good to them?", "anticipate": "", "conceptualize": "BIRTHDAY CELEBRATIONS (YOUR KIDS)\n\nPlanning\n\n- Discussing party expectations with your child- Creating an invite list- Researching party location options, including available dates, pricing, and number of children allowed- Planning family dinner and other special surprises for day of- In school birthday party preparation and supplies", "plan": "your child’s birthday party. Even if you keep it simple with a family dinner at home, this cardholder might be the one who battles rush-hour traffic to pick up a cake at a favorite bakery before it closes. Don’t forget candles, but no need to buy a present unless you’re also the “gifts (family)” lead.", "execute": "- Booking entertainment- Designing an online invitation or ordering printed ones and sending- Ordering favors, decorations, cake, candles, and paper products for party Note: Purchasing gifts is the responsibility of the “gifts (family)” cardholder", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a080b888c8f2a938ffa31", "source": "Fair Play template", "originalName": "Calendar Keeper", "title": "Calendar Keeper", "category": "Out", "owner": "Shared", "backupOwners": [], "purpose": "You know how some business executives have an assistant to schedule all their meetings and events? Well, your family is busier but you have no one. It’s up to you to create a system that works for your family so everyone knows what’s on the calendar day to day and week to week and plans accordingly. Just when you think you’ve nailed the schedule and hung it on the wall, you’ll find out that soccer practice is on the same day as Boy Scouts and you’ll be back to square one. Add in your own commitments along with your spouse’s, and you’ve got a job with more moving parts than a millipede.", "minimum": "The shared calendar accurately reflects family commitments, deadlines, travel, appointments, and important preparation needs.", "anticipate": "Watch school messages, invitations, appointments, work travel, renewals, and deadlines that affect the family.", "conceptualize": "Decide what belongs on the shared calendar, who needs to attend, and where conflicts or preparation are likely.", "plan": "Enter complete details, reminders, travel time, documents, and responsible people.", "execute": "Update changes, communicate conflicts, and make sure people know what they need to do.", "closeLoop": "Confirm completed or canceled items are resolved and future follow-ups are added.", "notes": "everyone schedules their own things and sends calendar invite to other. Puts on big hallway calendar. Kid stuff goes with other cards.", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a0871430a3c1a1a3eb801", "source": "Fair Play template", "originalName": "Cash & Bills", "title": "Bills", "category": "Out", "owner": "Carolyn", "backupOwners": [], "purpose": "How darn hard can it be to get to the bank so you have adequate cash on hand (after consulting the “money manager,” who can help define the standard for adequate)? Enter this cardholder, who will set up a system that prevents all interested parties from ever uttering or hearing, “Sorry, hon, I’ve only got five bucks.” This CPEer also handles the payment (on time!) of all bills, whether online, checks in the mail, or auto-pay, and balances the checkbook (or the virtual equivalent). Cozy up with the “mail” cardholder, who will ensure paper bills come your way.", "minimum": "Bills are paid accurately and on time, cash-flow needs are anticipated, and preventable fees or service disruptions are avoided.", "anticipate": "Monitor due dates, variable bills, renewals, account balances, unusual charges, and upcoming large expenses.", "conceptualize": "Decide payment timing, funding source, autopay use, and whether a charge needs review or dispute.", "plan": "Maintain a bill calendar, adequate balances, account access, and documentation.", "execute": "Pay, transfer funds, reconcile, and resolve billing problems.", "closeLoop": "Confirm payment posted correctly and save any needed receipt or follow-up reminder.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a16a70784117866ea507a", "source": "Fair Play template", "originalName": "Charity, Community Service, and Good Deeds", "title": "Charity, Community Service, and Good Deeds", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "You want to give back to your community, religious institution, your kids’ schools, or whatever causes are meaningful to you or to others who ask for your support. This cardholder is generous with his or her time (making the meatloaf for the neighborhood meal train) and also your family’s money, so don’t forget to consult the “money manager” before making pledges at the annual school fundraiser you can’t afford.", "minimum": "Do both partners feel good about your contributions to your community/greater world?", "anticipate": "", "conceptualize": "CHARITY & GOOD DEEDS (ADULT)", "plan": "- Researching charities", "execute": "- Making donations- Volunteering- Collecting donations for food banks/Serving on charity boards- Meal trains and other community support- Visiting the sick", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650a171416406a0f89e9a32f", "source": "Fair Play template", "originalName": "Childcare Helpers (Kids)", "title": "Childcare Helpers (Kids)", "category": "Home", "owner": "Shared", "backupOwners": [], "purpose": "It takes a village, and you’re fortunate if your village includes a nanny, babysitter, family caregivers, or others who pitch in with the kids. It can be a lifesaver to have the help, but it still requires someone to Conceive and Plan before Nanny Poppins or Grandma Shirley shows up to help Execute. They don’t magically appear when you want them to, so schedules need to be managed, along with payment, delegation of responsibilities, and ongoing communication. Heads up: When your helper cancels or quits, this cardholder is not necessarily the one who drops everything. Rather, engage in Fair Play immediately to re-deal the applicable cards, for example, “transportation (kids)” and “watching.”", "minimum": "Childcare Helpers is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by childcare helpers before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for childcare helpers.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "whomever is out of town or in a meeting needs to schedule childcare", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c1dc889be6a2d006b3b57", "source": "Fair Play template", "originalName": "Civic Engagement & Cultural Engagement", "title": "Civic Engagement & Cultural Engagement", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "Why do all your friends have tickets to the local production of Annie, and you didn’t even know about it? Maybe they had someone to CPE this card . . . and now you will, too. From your city council meetings to concerts to a lecture at the library, this cardholder will take it upon him or herself to research and plan for community events that enhance your family’s life experience. Check in with the “calendar keeper” before you purchase tickets to see your favorite redheaded orphan storm the stage.", "minimum": "Are your kids exposed to new events that enhance their regular life experiences?", "anticipate": "", "conceptualize": "CIVIC ENGAGEMENT & CULTURAL ENRICHMENT", "plan": "- Signing up for civic groups and voter registration drives- Researching opportunities (subscribing to local community, park, mall, bookstore, library events newsletters/emails/texts)- Discussing cultural interests as a family", "execute": "- Attending meetings of homeowners association, city council, Neighborhood Watch etc.- Purchasing tickets and/or memberships and attending (performing arts, sporting events, concerts, speaker series, museums/art exhibits, movies, comedy shows)", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c1e8c0418007416cb6178", "source": "Fair Play template", "originalName": "Cleaning", "title": "Cleaning", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "The pancake batter that fell into the crack on the side of the oven? Last week? It’s still there. The pee all over the toilet seat because your toddler can’t aim? Still there. The trail of sand in your entryway post-playground? Still there. If you have someone to help deep clean your bathroom and kitchen—lucky you. It’s still your responsibility to manage the schedule, task list, payment, etc. Re-deal this card often, as it’s a biggie. Tip! Coordinate with the “home goods and supplies” cardholder so you have cleaning supplies in the house when you need them.", "minimum": "Living spaces, bathrooms, and commonly used surfaces are kept clean, with deeper cleaning done weekly by cleaner company", "anticipate": "Notice dirt, clutter, odors, spills, and areas that are due for routine or deeper cleaning before someone else has to point them out.", "conceptualize": "Decide what needs cleaning, how often, what products or help are appropriate, and what level of cleanliness is acceptable. Communicate with cleaner staff.", "plan": "Maintain supplies, establish a workable routine, schedule deeper cleaning, and coordinate any paid help.", "execute": "Clean, reset supplies and equipment, and handle any related laundry, trash, or follow-up.", "closeLoop": "Confirm the relevant areas are usable, supplies are put away, and any unresolved issue is scheduled or communicated.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c1f8954eb6b7af4bd29e8", "source": "Fair Play template", "originalName": "Clothes & Accessories (Kids)", "title": "Clothes & Accessories (Kids)", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "News flash: Your kids’ shoes and clothes—in sizes that fit— don’t magically show up in their closets. Someone needs to CPE what clothes and accessories to buy, get to the appropriate stores, clean out drawers periodically, and hand off used and outgrown clothes to the “tidying up, organizing, and donations” cardholder. Suggested timeline: If your child’s feet have blisters, you’ve probably waited too long to buy new shoes. Exception: If there is a camp or school one-off clothing need (see Case of the Color War), this responsibility stays with the “school breaks (summer)” or “homework” cardholder.", "minimum": "Clothing, footwear, grooming, and hygiene needs are met with appropriate fit, condition, supplies, and timing.", "anticipate": "Notice growth, wear, weather changes, special events, hygiene needs, and supplies that are running low.", "conceptualize": "Decide what is needed, what can be reused, repaired, donated, or replaced, and what standards apply.", "plan": "Schedule appointments, create purchase lists, set a budget, and gather needed sizes or products.", "execute": "Purchase, organize, wash, groom, attend appointments, and dispose of or donate outdated items.", "closeLoop": "Confirm fit and usability, process returns, restock supplies, and update sizes or preferences.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c20cbdf621cf245a1f3e7", "source": "Fair Play template", "originalName": "Death", "title": "Death", "category": "Wild", "owner": "Shared", "backupOwners": [], "purpose": "As if the loss of a loved one isn’t unbearable enough, there are also many important items of business requiring your time, including arranging a funeral, a shiva or other spiritual or religious rituals, and then acknowledging those who paid their respects. If handling any will or estate issues and packing up your loved one’s home and belongings are your responsibilities, prepare to be holding this card for quite some time.", "minimum": "Immediate arrangements, legal and financial notifications, family communication, property, and remembrance needs are handled with care and appropriate documentation.", "anticipate": "Identify urgent deadlines, key contacts, documents, dependents, property, accounts, services, and family members needing support.", "conceptualize": "Determine priorities, authority, wishes, budget, communication approach, and what can wait.", "plan": "Create a task list, assign help, schedule services, gather records, and coordinate legal or financial professionals.", "execute": "Make notifications and arrangements, secure property, complete required filings, and support the family.", "closeLoop": "Track unresolved accounts, documents, distributions, thank-yous, memorial items, and longer-term grief support.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c2588fe10c1c92c4bc875", "source": "Fair Play template", "originalName": "Dental (Kids)", "title": "Dental (Kids)", "category": "Caregiving", "owner": "Adam", "backupOwners": [], "purpose": "Your kid’s job: Pick out a rubber band color for his braces. Your job: Carve out a boatload of time for orthodontist appointments and pay for it all, too. Regular dental visits will also keep you plenty busy because each child needs regular cleanings and checkups (it’s been six months already?) along with more time-consuming appointments for getting cavities filled. You get a free toothbrush at the end of each visit, so at least there’s that.", "minimum": "Children receive timely preventive and necessary dental care, maintain supplies, and follow treatment recommendations.", "anticipate": "Track cleanings, orthodontic needs, pain, lost teeth, treatment plans, insurance limits, and hygiene supplies.", "conceptualize": "Decide provider, timing, treatment questions, urgency, and how to balance cost, school, and comfort.", "plan": "Schedule visits, prepare insurance and records, arrange transportation, and discuss the visit with the child.", "execute": "Attend or coordinate care, obtain instructions, pay or track charges, and purchase recommended supplies.", "closeLoop": "Schedule follow-ups, monitor symptoms, complete home-care instructions, and resolve insurance issues.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c260ba5ab0a5ba0c76227", "source": "Fair Play template", "originalName": "Diapering & Potty Training (Kids)", "title": "TBD", "category": "Caregiving", "owner": "Unassigned", "backupOwners": [], "purpose": "Let’s be clear: This cardholder will not be the only one changing diapers. Expect to re-deal this card often. While you are the lead, you will, however, be the one responsible for maintaining inventory, including ordering new diapers or washing cloth ones, and getting the soiled ones out of your house ASAP. This cardholder will also oversee potty training your kids, including cleaning up the mistakes along the way. When you’re finally a diaper-free home, you may still find yourself wiping the butt of your first grader, who is perfectly capable of doing it on his or her own. This will end one day—promise.", "minimum": "Diapering & Potty Training is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by diapering & potty training before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for diapering & potty training.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c27184a6df3b2ed7dc848", "source": "Fair Play template", "originalName": "Discipline & Screen Time (Kids)", "title": "Discipline & Screen Time (Kids)", "category": "Caregiving", "owner": "Unassigned", "backupOwners": [], "purpose": "While it’s no fun to discipline kids, the Magic is in setting critical boundaries and giving them tools that will impact how safe they feel and how they conduct themselves for a lifetime. The goal is not for one parent to be responsible for discipline while the other holds “fun! and playing” forever. That’s why this card requires ongoing collaboration between partners, with one cardholder at a time taking the lead. For example, screen time. This came up as the most discussed disciplinary issue within families. It’s a biggie, and if you hold this card, you may conduct research about an appropriate amount of screen time for your kids and consult with your partner about reasonable boundaries along with the parameters for taking it away; then you’ll each enforce your family’s rules and consequences on an ongoing basis.", "minimum": "Are you guiding your children to know right from wrong and the consequences of their actions? What is appropriate for them to watch and for how long?", "anticipate": "", "conceptualize": "DISCIPLINE & SCREEN TIME (DG)", "plan": "- Researching appropriate discipline for different life stages- Devising a strategy to recommend to your spouse- Setting up parental controls, negotiating what games/sites your kid can visit, downloading one of those apps that turns the Wi-Fi off on your child’s device after a certain number of minutes- Informing childcare helpers of limits as needed- Updating plan as needed", "execute": "- Informing child and enforcing limits", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c3f780df37cda414e1853", "source": "Fair Play template", "originalName": "Dishes", "title": "Dishes", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "It’s no wonder so many articles about domestic labor begin and end with dishes—the metaphorical third rail of chores. This cardholder is responsible for washing and drying by hand and/or loading and unloading the dishwasher—for every meal. The upside? Your partner doesn’t get to criticize how you put the plates in the “wrong” way. Re-deal this card often to avoid thrown dishes.", "minimum": "The kitchen has clean dishes and usable counters, and dirty dishes do not accumulate beyond the agreed timeframe.", "anticipate": "Notice when the dishwasher is clean or full, when hand-wash items are waiting, and when dish supplies are low.", "conceptualize": "Decide when to run or unload the dishwasher and how to handle items needing special care.", "plan": "Keep detergent and cleaning tools available and fit dish care into the household routine.", "execute": "Load, run, unload, hand-wash, dry, and put away dishes as needed.", "closeLoop": "Leave the sink, dishwasher, and counters ready for the next use.", "notes": "clean before next meal, or at a minimum daily", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c3fdbcd23987ef03695ba", "source": "Fair Play template", "originalName": "Dry Cleaning", "title": "Lawn Mowing and Pest Control", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "Even something as seemingly straightforward as dry cleaning requires step-by-step CPE. This card entails having a bin/bag at home, ensuring the appropriate clothes get into that bin/bag, finding a dry cleaner, knowing when it’s open so you can coordinate drop-off and pickup, and taking off the plastic wrapping before hanging clothes back in the closet. If the mutually agreed-upon MSC is that all clothes come back home, this cardholder is responsible for tracking down their spouse’s favorite shirt when it goes missing or negotiating a refund. (And maybe finding a new dry cleaner, too.)", "minimum": "x", "anticipate": "x", "conceptualize": "x", "plan": "x", "execute": "xed.", "closeLoop": "x", "notes": "communicate and pay lawn care and pest control", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c40739e73f699c8712e60", "source": "Fair Play template", "originalName": "Electronics & IT", "title": "Electronics & IT", "category": "Out", "owner": "Adam", "backupOwners": [], "purpose": "When your cell phone screen shatters, who ya gonna call? This cardholder! When your Wi-Fi isn’t working or your DVR is full, who ya gonna call? This cardholder! You need not work at the cable company or have tech know-how, but you do need to have ample time and patience to CPE this card, especially when you have to wait six hours for the cable guy. New cords, chargers, and ink cartridges? Also you. Waiting in line to get your kid his first phone? Still you.", "minimum": "Electronics & IT remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that electronics & it needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c4206bc5be5119b6a14b9", "source": "Fair Play template", "originalName": "Estate Planning & Life Insurance", "title": "Estate Planning & Life Insurance", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "Who will take care of your kids if something catastrophic happens to you and your partner? Of course both partners will plan together as you think about long-term security for your family and life-and-death medical decisions, but ultimately this cardholder is responsible for making sure the job gets done so you can all sleep at night knowing there’s a worst-case scenario plan (and insurance funds) in place.", "minimum": "Estate Planning & Life Insurance is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by estate planning & life insurance before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for estate planning & life insurance.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c4326bf91fdbde7cbe731", "source": "Fair Play template", "originalName": "Extended Family", "title": "Extended Family", "category": "Magic", "owner": "Shared", "backupOwners": [], "purpose": "Someone’s got to remember to call Great-Aunt Mary on her ninetieth birthday. Same goes for scheduling playdates with cousins if you want the kids to have a relationship (even if you’re the one who always ends up doing the two-hour roundtrip drive). Depending on how much you and your partner value this card, this CPEer might plan frequent get-togethers with relatives or just be the one to remember to invite Uncle Norman to Thanksgiving dinner knowing full well he’ll have one too many drinks and talk politics all night.", "minimum": "Extended Family is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by extended family before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for extended family.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "everyone responsible for their own family", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-650c43e9e162b663507d837d", "source": "Fair Play template", "originalName": "Extra-Curricular (Non-Sports)", "title": "Extra-Curricular (Non-Sports)", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "Let’s say your daughter begs to be in the school play—with rehearsals on the same days that she already has Girl Scouts. This cardholder must sleuth out what the extracurricular commitment entails and how to juggle it within the context of the family calendar. Note! This card pairs with the “transportation (kids)” and “packing (local)” cards. Meaning, if you register your daughter for Girl Scouts and also sign her up for the school play, you are responsible for coordinating how she will get to and from both events with both her costume and cookies in hand.", "minimum": "Are you fostering your goals for your children which may include friendship, life skills, healthy competition, coordination, and brain development? Is it consistent enough for your kid to be enriched by the experience (meaningful exposure) and are they demonstrating improvement?", "anticipate": "", "conceptualize": "EXTRA-CURRICULAR (NON-SPORTS) (DG)", "plan": "Determining child's desired activities- Researching all activity options (0-2: baby music, gymnastics, and play groups; 2 and up: variety of options)- Surveying child's friends to see if child can participate with friends (in consult with “friendship” cardholder)- Determining practice schedules if applicable- Managing at home practice and preparation and/or arranging for additional support/coaching (consult with “tutoring/coaching” cardholder)- Reviewing schedule and consulting with “calendar keeper”, “transportation (kids)”, “tutoring and coaching”, and “showing up and participating” cardholders- Arranging for transportation", "execute": "- Signing up and registering for activities- Purchasing/storing/updating items for activity- Packing necessary items in bag for practice (including water bottle and snacks)- Volunteering when necessary (snack sign-up, work backstage, etc.)", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f00b5f56cd1fad0bbec4", "source": "Fair Play template", "originalName": "Extra-Curricular (Sports)", "title": "Extra-Curricular (Sports)", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "If you think this card means just showing up on the right field at the right time to cheer on your kid, you couldn’t be more wrong. While the", "minimum": "Are you fostering your goals for your children which may include friendship, life skills, healthy competition, coordination, and brain development? Is it consistent enough for your kid to be enriched by the experience (meaningful exposure) and are they demonstrating improvement?", "anticipate": "", "conceptualize": "and", "plan": "are more tedious and require tremendous forethought. What are the equipment needs? What’s the game schedule? And when do you have to provide the team snack? Note! This card also pairs with the “transportation (kids)” and “packing (local)” cards. Not only are you responsible for making sure the mitt is in the bag, but you’re also on the hook for coordinating how your kid will get to the field on time.\n\nConception\nEXTRA-CURRICULAR (SPORTS) (DG)\n\nPlanning\n- Determining child's desired activities- Researching all sports options (school, gyms and/or community leagues)- Surveying child's friends to see if child can play with friends (in consult with “friendship” cardholder)- Determining practice and game schedules- Managing at-home practice and preparation and/or arranging for additional support/coaching (consult with “tutoring/coaching” cardholder)- Researching equipment needs- Arranging for transportation to practices and games\n\nExecution\n- Signing up and registering for the sports lesson/team- Purchasing/storing/laundering/updating necessary uniforms/equipment/cleats- Packing necessary items in bag for practice and games (including uniform, water bottle and snacks)- Volunteering when necessary (snack sign-up, end-of-season party, etc.)", "execute": "can be rewarding when you’re there to watch your child hit a home run, the", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f06d111b6b19209bee3f", "source": "Fair Play template", "originalName": "First Year of Infant's Life", "title": "TBD", "category": "Wild", "owner": "Unassigned", "backupOwners": [], "purpose": "Unsettled hormones, sleep deprivation, and a ravaged body are enough to make this a Wild card, not to mention that your time has all but disappeared. The days of having even a consecutive two-hour stretch of time to be productive are a vague memory as you drown in nursing/feeding, diaper changing, comforting your baby around the clock, and an innumerable amount of other to-dos all courtesy of your bundle of joy. Make no mistake: The first year of an infant’s life is not only a “Mom thing.” There’s plenty for Dad to do, too. While you’re trying to survive another day, let him dig into the Daily Grind cards: “laundry,” “dishes,” “garbage,” “groceries,” and taking the lead on “meals (weekday dinner).”", "minimum": "The family responds to first year of infant's life with essential safety, communication, financial, logistical, and emotional needs clearly owned.", "anticipate": "Identify urgent risks, deadlines, affected people, available resources, and what may worsen without action.", "conceptualize": "Set priorities, determine what decisions are needed now, and distinguish immediate needs from later work.", "plan": "Create a short action plan, assign help, gather documents, arrange coverage, and establish backup options.", "execute": "Carry out the highest-priority actions, communicate changes, and coordinate professional or family support.", "closeLoop": "Confirm immediate stability, track unresolved items, update the longer-term plan, and reassess household capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f10fdb120e01240deb1f", "source": "Fair Play template", "originalName": "First-Aid, Safety & Emergency", "title": "First-Aid, Safety & Emergency", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "Before bringing home baby from the hospital, this cardholder has installed the infant car seat (yep, it’s a pain, but it’s the law). Before a major storm hits, this cardholder will stock up on batteries, bottled water, and other basics. Does your family have an emergency plan for a time when phones may not work and you need to leave the house for a safer place? Working flashlights, candles, and matches for when the power is out? Needless to say, this card is a big one and should be taken seriously.", "minimum": "Are you sufficiently prepared?", "anticipate": "", "conceptualize": "FIRST-AID, SAFETY & EMERGENCY", "plan": "- Developing emergency list/plan to include contacts, medical directions, home shut off systems etc.- Researching car seats", "execute": "- Creating first-aid kit and other supplies, such as extra food/flashlights, etc. for home and car- Earthquake proofing/childproofing home- Purchasing and installing car seats", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f1683a076c5a0d7393e6", "source": "Fair Play template", "originalName": "Friendships & Social Media (Kids)", "title": "Friendships & Social Media (Kids)", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "Do you know who your kids are playing with IRL and online? Unless your children come home from school in tears confiding in you, how would you know if they’re hanging with the wrong crowd, feeling left out, or being bullied? Make it your business to plug in (get it?) to your kids’ social dynamics online and also help plan and supervise playdates, sleepovers, and any other kid get-togethers.", "minimum": "Friendships & Social Media is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by friendships & social media before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for friendships & social media.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f1c5c73227f7a9da6027", "source": "Fair Play template", "originalName": "Fun & Playing (Kids)", "title": "Fun & Playing (Kids)", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Maybe you’ve forgotten that parenting is fun! So fun that after you take your kids to the indoor water park they begged you to take them to, your ensuing urinary tract infection feels totally worth it. Seriously, childhood should include interactive playful moments as a family on a regular basis, and those moments and memories are, in fact, magical (UTI notwithstanding). This cardholder will CPE ongoing time for fun, such as arranging to throw a football around in the park at twilight, creating a weekly family game night, or any other activities your kids enjoy. Holding this card can be a blast, so be sure to hand it back and forth regularly with your partner and spread the fun around.", "minimum": "Has your family shared some interactive playful moments recently?", "anticipate": "", "conceptualize": "FUN! & PLAYING", "plan": "- Planning consistent opportunities for family fun: game nights, reading together, playing sports, hiking, races, biking, running, building forts/blocks/Legos, playgrounds, amusement parks, magic, kites, science, tinkering, fun runs, dances, baking, special projects, etc.", "execute": "- Executing consistent opportunities for family fun", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f20e7f7f9283d1ca729f", "source": "Fair Play template", "originalName": "Garbage", "title": "Garbage", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "Really, how much darn trash can one family create? Staggering. To CPE this card means, at minimum, you take out the trash before the garbage truck turns the corner of your block (which day is it again?). Whoever holds this card is responsible for anticipating when trash bags are running low, and a word to the wise: Don’t you dare sit back down on the couch until you put a new bag back in the trash can!", "minimum": "Household trash, recycling, and special waste are removed before overflow, odors, pests, or missed collection occur.", "anticipate": "Track fullness, collection days, holiday schedule changes, and items requiring special disposal.", "conceptualize": "Determine what is trash, recyclable, donated, composted, or taken to a special facility.", "plan": "Maintain bags and bins, know pickup rules, and schedule bulky or hazardous disposal.", "execute": "Empty bins, replace liners, move containers for collection, and return them afterward.", "closeLoop": "Confirm waste was collected and address missed pickup, leaks, odors, or damaged containers.", "notes": "kitchen, bathroom, bedrooms trash", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f25309d569f85231d35f", "source": "Fair Play template", "originalName": "Gestures of Love (Kids)", "title": "Gestures of Love (Kids)", "category": "Magic", "owner": "Carolyn", "backupOwners": [], "purpose": "You know that mom who leaves handwritten notes in her kid’s lunch box that read “I love you to the moon and back”? Or the dad who drops by basketball practice for a quick hug? With some thought, time, and effort—some CPE, if you will—that parent could be you, making every day a little more special for everyone. Note! You’re both equally capable of having the forethought and spending the time to buy a bouquet of flowers before your child’s dance recital, but trust me on this—even gestures of love benefit from one person taking the lead. To ensure that the gesture isn’t missed or forgotten, assign one person to pick up flowers for the recital this week, and then re-deal to assign a lead next week.", "minimum": "Important people are acknowledged in a thoughtful, timely way that fits the relationship, occasion, budget, and family values.", "anticipate": "Track occasions, preferences, addresses, deadlines, shipping time, and people who may otherwise be overlooked.", "conceptualize": "Decide the appropriate gesture, message, budget, and level of personalization.", "plan": "Create the list, obtain addresses, purchase or make items, and schedule delivery or mailing.", "execute": "Complete, wrap, write, send, deliver, or arrange the gesture.", "closeLoop": "Confirm receipt when appropriate, manage returns, and update notes or contact information.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f2c3b87fd59a2db17f94", "source": "Fair Play template", "originalName": "Gifts (Family)", "title": "Gifts (Family)", "category": "Magic", "owner": "Carolyn", "backupOwners": [], "purpose": "Gift giving is not about buying something because a date on the calendar compels you to. When you get it right, it’s about connection and appreciation. The Magic here lies in finding gifts and writing cards that will make your family members feel special when a holiday, graduation, birthday, or any other occasion comes around. So the next time you see a card with a message that would resonate with your child, you might purchase it even though his or her birthday is a few months away. Tip! Re-deal as needed so you don’t have to buy birthday gifts for yourself.", "minimum": "Important people are acknowledged in a thoughtful, timely way that fits the relationship, occasion, budget, and family values.", "anticipate": "Track occasions, preferences, addresses, deadlines, shipping time, and people who may otherwise be overlooked.", "conceptualize": "Decide the appropriate gesture, message, budget, and level of personalization.", "plan": "Create the list, obtain addresses, purchase or make items, and schedule delivery or mailing.", "execute": "Complete, wrap, write, send, deliver, or arrange the gesture.", "closeLoop": "Confirm receipt when appropriate, manage returns, and update notes or contact information.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f32ea947c28e2e389854", "source": "Fair Play template", "originalName": "Gifts (VIPs)", "title": "Gifts (VIPs)", "category": "Magic", "owner": "Carolyn", "backupOwners": [], "purpose": "When it comes to Very Important People gift giving, the recipient might be your child’s teacher, coach, or the neighbors hosting you two doors down. If regifting is your thing, then CPEing this card can be easy and straightforward. Alternatively, this cardholder may wish to spend more time personalizing gifts and writing heartfelt cards. Either way—or somewhere in the middle—gift giving is an opportunity to connect with and thank the very important people in your life, which requires year-round CPE. Exception: Other kids’ birthday gifts stays with the “birthday celebrations (other kids)” cardholder.", "minimum": "Important people are acknowledged in a thoughtful, timely way that fits the relationship, occasion, budget, and family values.", "anticipate": "Track occasions, preferences, addresses, deadlines, shipping time, and people who may otherwise be overlooked.", "conceptualize": "Decide the appropriate gesture, message, budget, and level of personalization.", "plan": "Create the list, obtain addresses, purchase or make items, and schedule delivery or mailing.", "execute": "Complete, wrap, write, send, deliver, or arrange the gesture.", "closeLoop": "Confirm receipt when appropriate, manage returns, and update notes or contact information.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f39abb9df97f75dbfc0f", "source": "Fair Play template", "originalName": "Glitch in the Matrix / Daily Disruption", "title": "Glitch in the Matrix / Daily Disruption", "category": "Wild", "owner": "Carolyn", "backupOwners": [], "purpose": "The last thing in the world you have time for is dealing with the unexpected disruption of a fender bender, a computer virus, a flooded basement . . . or having the phone ring and seeing the dreaded school phone number. Your child has lice . . . can you come pick her up? You don’t get a vote when a Wild card lands in your lap, but you do get to ask for a helping hand from your partner when a daily disruption torpedoes your day. Remember: Leaving work early because of X, Y, or Z is not “on you” unless you currently hold this card.", "minimum": "Glitch in the Matrix / Daily Disruption remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that glitch in the matrix / daily disruption needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f4529c50c45574fd0bae", "source": "Fair Play template", "originalName": "Groceries", "title": "Groceries", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "Your family needs to eat. Can we all agree on that? Good. So how do the pantry and refrigerator get stocked on an ongoing basis? With CPE. This includes noticing what’s about to be used up or expire, keeping a running grocery list, and getting to the market . . . ideally before you realize there’s not a drop of milk in the fridge. Even if your family orders groceries online and your go-to dinner is frozen pizza, this card requires CPE nearly 365 days a year. Consult the various “meals” cardholders regularly so you can be sure you have taco shells in the cupboard for taco night.", "minimum": "The household has enough appropriate food and essential consumables for planned meals, lunches, snacks, and routine needs.", "anticipate": "Monitor pantry, refrigerator, freezer, school-lunch items, staples, preferences, and upcoming schedule changes.", "conceptualize": "Decide what is needed based on meals, budget, dietary needs, activities, guests, and existing inventory.", "plan": "Create the list, choose store or delivery method, organize coupons if useful, and schedule the purchase.", "execute": "Purchase or receive items, resolve substitutions, and put everything away safely.", "closeLoop": "Confirm key items were obtained, update the plan for missing items, and prevent avoidable waste.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f4ed60be2559ae47bb34", "source": "Fair Play template", "originalName": "Grooming & Wardrobe (Player 1)", "title": "Grooming & Wardrobe Adam", "category": "Caregiving", "owner": "Adam", "backupOwners": [], "purpose": "Looking and feeling good, especially after children, doesn’t come easy. (There’s a reason that beauty is a $445 billion industry.) Even if you’re a DIY kind of woman, it still takes time to slather on moisturizer, pluck your eyebrows, style your hair, and put on lipstick. Kick it up a notch and you may add mani/pedis, eyelash extensions, and waxing to your beauty regimen. Add in shopping for clothes (in various sizes for pre-pregnancy, post-pregnancy, nursing, and every other reason your weight fluctuates) and you’ve got a potentially expensive and time-consuming card in your hands.", "minimum": "Clothing, footwear, grooming, and hygiene needs are met with appropriate fit, condition, supplies, and timing.", "anticipate": "Notice growth, wear, weather changes, special events, hygiene needs, and supplies that are running low.", "conceptualize": "Decide what is needed, what can be reused, repaired, donated, or replaced, and what standards apply.", "plan": "Schedule appointments, create purchase lists, set a budget, and gather needed sizes or products.", "execute": "Purchase, organize, wash, groom, attend appointments, and dispose of or donate outdated items.", "closeLoop": "Confirm fit and usability, process returns, restock supplies, and update sizes or preferences.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f5700034088f1f1b26e3", "source": "Fair Play template", "originalName": "Grooming & Wardrobe (Player 2)", "title": "Grooming & Wardrobe Carolyn", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "Imagine a conversation that starts innocently enough with a husband asking his wife, “Babe, where’s my black suit?” Then comes, “Never mind. Found it.” (Pause.) “Shoot, it doesn’t fit anymore.” And the coup de grâce is that their best friends’ wedding begins in one hour and the clock is ticking while he blames his wife for failing to buy or rent him a new one. This scenario is all too common as many women in hetero cis gender relationships CPE this card for their husbands. That’s right, grown men told me they rely on their wives not only to help them get dressed for special events but also to schedule haircuts, hem their pants, and replace their underwear with holes. If that truly works for you both, God bless. Otherwise, please consider taking this card for yourself, mister. You can do it.", "minimum": "Clothing, footwear, grooming, and hygiene needs are met with appropriate fit, condition, supplies, and timing.", "anticipate": "Notice growth, wear, weather changes, special events, hygiene needs, and supplies that are running low.", "conceptualize": "Decide what is needed, what can be reused, repaired, donated, or replaced, and what standards apply.", "plan": "Schedule appointments, create purchase lists, set a budget, and gather needed sizes or products.", "execute": "Purchase, organize, wash, groom, attend appointments, and dispose of or donate outdated items.", "closeLoop": "Confirm fit and usability, process returns, restock supplies, and update sizes or preferences.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f5f7587f9be2a5dd7aa3", "source": "Fair Play template", "originalName": "Hard Questions", "title": "Hard Questions", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "“Why do I have hair growing under my armpits?” “What does it mean when the other kids talk about ‘doing it’?” Enough said. You and your partner may re-deal this card to each other based on the question at hand or which child is asking, but when it’s your turn, be prepared as best you can to research and impart thoughtful, accurate, and age-appropriate wisdom. Spoiler alert: The questions get tougher and the stakes get higher as your kids grow up.", "minimum": "Are your children’s hard questions appropriately researched and answered in a way that feels good to both of you?", "anticipate": "", "conceptualize": "ANSWERING HARD QUESTIONS", "plan": "- Determining the appropriate age to discuss certain topics with your child (puberty, gender, sex/pornography, sexuality, drugs/alcohol, suicide, religion, family choices)- Connecting with friends who have older children to gather advice on how to introduce difficult topics- Consulting with doctors, professionals, and/or community resources when necessary", "execute": "- Purchasing age-appropriate books to help educate your children- Being available for and open when answering your children’s questions", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f6455e2ca5145aa26276", "source": "Fair Play template", "originalName": "Health Insurance", "title": "Health Insurance", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "It’s a blessing to have health insurance. The paperwork that goes along with it? Not so much. Unless you somehow find a medical practice that handles all the billing for you, this cardholder needs to know every time anyone in your family goes to the doctor, makes sure the appropriate paperwork is filed for insurance, keeps track of reimbursements, and steps in when things go awry. Every time you see an envelope from your insurance provider (consult with the “mail” cardholder to ensure you receive), say a prayer that you’ve been covered.", "minimum": "Health Insurance is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by health insurance before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for health insurance.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "health, dental and accident policy", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f6a73561843f8938b460", "source": "Fair Play template", "originalName": "Holiday Cards", "title": "Gifts for Mom", "category": "Magic", "owner": "Adam", "backupOwners": [], "purpose": "Get ready to turn the already chaotic holidays into a job filled with a spreadsheet of personal contacts (did they move?), address labels, and the inevitable returned cards that haunt you until next year. The amount of time—even if you go digital with an e-card—is colossal. Not to mention the nearly impossible feat of taking a family picture with everyone looking in the same direction and smiling! But think about it: It’s the one time a year Cousin Susie sees a picture of your growing family. In other words, holiday cards can be a meaningful touch point that makes all the CPE well worth it.", "minimum": "At least 1 gift per holiday", "anticipate": "research and learn what gifts might be appropriate, keep track of upcoming events", "conceptualize": "do research ", "plan": "make a plan of gift research and procurement", "execute": "Get a gift", "closeLoop": "Think about next year", "notes": "birthday, christmas, valenties day, mothers day, grammy birthday, anniversary", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f70a6193d838dd76a1ed", "source": "Fair Play template", "originalName": "Holidays", "title": "Holidays", "category": "Magic", "owner": "Shared", "backupOwners": [], "purpose": "Just the time it takes to get holiday ornaments out of storage and unwrap them merits a glass of wine (or three), and that’s before the hard work even begins. From cooking to decor to all the logistics, CPEing any holiday is like running an event-", "minimum": "Holiday commitments, traditions, travel, food, gifts, and emotional expectations are managed within agreed time, budget, and energy limits.", "anticipate": "Track dates, family expectations, school events, travel, gifts, meals, decorating, and people who may need extra support.", "conceptualize": "Decide which traditions to keep, simplify, decline, or change and what a successful holiday looks like this year.", "plan": "Create the calendar, budget, lists, reservations, menus, purchases, and delegation plan.", "execute": "Complete preparations, communicate boundaries, and carry out the agreed celebrations.", "closeLoop": "Clean up, store items, handle returns and thank-yous, and record helpful notes for next time.", "notes": "hosting holidays - mom\nhalloween - dad\nholiday gifts - shared\nmom holiday gifts - dad", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f75a6daa325bdf503a1a", "source": "Fair Play template", "originalName": "Home Furnishings", "title": "Home Furnishings", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "CPEing this card can be as basic as making sure that every bed has a pillow, you have towels in the closet, and the drinking glasses with cracks get replaced before someone chips a tooth. This card is not a one-time deal, as there’s regular inventory to be taken and just when you could use that 20 percent off Bed Bath and Beyond coupon, it’s nowhere to be found. Kindly discuss with the “points, miles, and coupons” cardholder so you’re buttoned up for your next trip to the store.", "minimum": "Home Furnishings remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that home furnishings needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f7cb4b84265e60630a04", "source": "Fair Play template", "originalName": "Home Goods & Supplies", "title": "Home Goods & Supplies", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "This card requires CPE of everything from laundry detergent, batteries, and lightbulbs, to toothpaste, coffee filters, and trash bags! Expect to be astounded by how your parents’ generation pulled this off without Amazon.", "minimum": "Home Goods & Supplies remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that home goods & supplies needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "TP, paper towels, paper plates, plastic utensils, ", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f8ece43f8074c8cf2288", "source": "Fair Play template", "originalName": "Home Maintenance", "title": "Home Maintenance", "category": "Home", "o
