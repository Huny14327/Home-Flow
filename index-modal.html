wner": "Adam", "backupOwners": [], "purpose": "How many people does it take to change a lightbulb? In this game, just one, and it’s the person holding this card. You’re also responsible for unclogging toilets, calling a repairman when the air conditioner breaks (inevitably in the height of summer), finding the manual for the vacuum cleaner that’s spewing dust, and every other home maintenance to-do that requires hands-on CPE.", "minimum": "The home remains safe, functional, weather-protected, and reasonably maintained, with urgent problems addressed promptly.", "anticipate": "Notice wear, leaks, noises, service intervals, warranties, seasonal needs, and signs of emerging problems.", "conceptualize": "Determine urgency, likely cause, repair versus replacement, budget, and whether professional help is required.", "plan": "Research options, obtain quotes, schedule access, order parts, and prepare the area.", "execute": "Complete or oversee the work and manage communication, payment, and cleanup.", "closeLoop": "Verify the issue is resolved, retain records, and schedule future maintenance if needed.", "notes": "AC filter and drain line cleaning, plumbing, wall repairs, AC issues, elecrical issues", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f95ab83e9b4c29716949", "source": "Fair Play template", "originalName": "Home Purchase/Rental/Mortgage & Insurance", "title": "Home Purchase/Rental/Mortgage & Insurance", "category": "Home", "owner": "Unassigned", "backupOwners": [], "purpose": "If you aspire to be a homeowner with a mortgage one day, then when the time comes, you’ll need to CPE the purchasing process. If you’re already a homeowner with a mortgage, this cardholder oversees title insurance, reviewing an infinite amount of statements, and possible refinancing. If you’re looking to rent, then you’ll be the one to scour listings, fill out applications, and furnish your credit score. You’ll also handle home insurance (whether you rent or own), including evaluating the appropriate policy and filing claims if needed. Grab this card fast if paperwork and record-keeping are your strong suits.", "minimum": "Do you have keys to your pad? Plus insurance for your home and most important items?", "anticipate": "", "conceptualize": "HOME PURCHASE/RENTAL, MORTGAGE & INSURANCE", "plan": "- Researching neighborhoods (affordability consulting with “money manager” cardholder, local schools, parks, safety)- Selecting home Realtor or rental broker, mortgage broker/lender- Attending open houses and touring homes/apartments- Securing pre-approval from bank for loan (including managing appraisers)- Managing financial documentation (tax returns, bank statements, income verification)- Ensuring credit score is up to par- Budgeting for mortgage payment, property tax/insurance, assessments and other homeowner expenses- Researching homeowners/renters insurance and other possible other options (earthquake, flood, etc.)", "execute": "- Making offer (process) and managing closing- Attending and managing inspections- Making down payment money available- Purchasing homeowners/renters insurance and possible other options", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517f9e2cac2548bce5b43ca", "source": "Fair Play template", "originalName": "Home Renovation", "title": "Home Renovation", "category": "Wild", "owner": "Adam", "backupOwners": [], "purpose": "Wild cards fall on a spectrum in terms of how life-altering and time-consuming the predicament can be. Obviously installing new toilets or kitchen cabinets is not as serious an endeavor as keeping your newborn nourished or managing a parent’s chemotherapy schedule. Still, it sure would be nice to have a working toilet and a functional kitchen, so someone’s got to do the work to make that happen.", "minimum": "The family responds to home renovation with essential safety, communication, financial, logistical, and emotional needs clearly owned.", "anticipate": "Identify urgent risks, deadlines, affected people, available resources, and what may worsen without action.", "conceptualize": "Set priorities, determine what decisions are needed now, and distinguish immediate needs from later work.", "plan": "Create a short action plan, assign help, gather documents, arrange coverage, and establish backup options.", "execute": "Carry out the highest-priority actions, communicate changes, and coordinate professional or family support.", "closeLoop": "Confirm immediate stability, track unresolved items, update the longer-term plan, and reassess household capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fa489e6b70a9a372dbee", "source": "Fair Play template", "originalName": "Homework, Projects & School Supplies (Kids)", "title": "Homework, Projects & School Supplies (Kids)", "category": "Caregiving", "owner": "Unassigned", "backupOwners": [], "purpose": "Has homework become a family affair? Even if you swore you’d never be the kind of parent who micromanages and digs in to your kids’ assignments, you at least need to be in the know if they don’t do their homework and be available if your child needs support. CPEing this card means not only taking the lead on daily assignments but also school projects and enrichment learning at home. If your child needs poster board for “Star Student of the Week” or munchies for “Snack Day,” that’s also on you, as well as outfitting your child for “Wacky Winter” dress-up day and providing two dozen (hand-signed!) Valentine’s Day cards on February 14. This is an endless job, so re-deal this card often.", "minimum": "Are the kids supported enough so that they can turn their homework in on time?", "anticipate": "", "conceptualize": "HOMEWORK, PROJECTS, & SCHOOL SUPPLIES (DG)", "plan": "- Supervising welcome-to-school assignments (e.g., photos of my family)- Assessing child’s daily/weekly homework needs- Helping child prioritize what needs to be done based on after-school activity schedule- Updating “calendar keeper” and “school breaks” cardholders on all important school dates including fall school recess, half days, conference weeks, winter break", "execute": "- Assisting child when needed and providing emotional support when homework is challenging- Assisting child with studying for tests- Supporting and purchasing supplies for major projects (science fair, school biography, secret buddy gifts, Valentines, etc.)- Purchasing/arranging clothes for special days (e.g., school photos, performance concerts, field day, color wars, school theme days) and consulting with “morning routine” cardholder- Ordering school uniform if applicable- Ordering/shopping for back-to-school supplies", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517facdcbdc9d56aa460964", "source": "Fair Play template", "originalName": "Hosting", "title": "Hosting", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "Whether it’s a backyard barbecue, potluck dinner, or any other get-together in your home or elsewhere, hosting often entails sending out invites,", "minimum": "Hosting is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by hosting before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for hosting.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fb0cdabc1515143ebf76", "source": "Fair Play template", "originalName": "Informal Education (Kids)", "title": "Informal Education (Kids)", "category": "Magic", "owner": "Adam", "backupOwners": [], "purpose": "Do you remember who taught you how to hold your breath under water? Throw a ball? Ride a bike? Of course you do, and so will your child as soon as this cardholder gets to work. Kudos to you for the countless hours you’ll spend hovering over a bike seat with your back wrenched—that’s the", "minimum": "Informal Education is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by informal education before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for informal education.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fb5d026849193cb3810d", "source": "Fair Play template", "originalName": "Job Loss & Money Problems", "title": "Job Loss & Money Problems", "category": "Wild", "owner": "Shared", "backupOwners": [], "purpose": "Serious financial issues like unemployment or bankruptcy require heavy lifting that may include networking, job interviews, court appearances, and many other time-sucking items of business. Of course you’re both impacted by the stressful issue at hand, but this cardholder takes the lead on resolving it while consulting with the “money manager” so your family’s budget can be modified accordingly.", "minimum": "The family responds to job loss & money problems with essential safety, communication, financial, logistical, and emotional needs clearly owned.", "anticipate": "Identify urgent risks, deadlines, affected people, available resources, and what may worsen without action.", "conceptualize": "Set priorities, determine what decisions are needed now, and distinguish immediate needs from later work.", "plan": "Create a short action plan, assign help, gather documents, arrange coverage, and establish backup options.", "execute": "Carry out the highest-priority actions, communicate changes, and coordinate professional or family support.", "closeLoop": "Confirm immediate stability, track unresolved items, update the longer-term plan, and reassess household capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fb98fb8f6beb53e1dcd9", "source": "Fair Play template", "originalName": "Laundry", "title": "Laundry", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "f you haven’t ever CPE’d this card, would you like to take a guess at how many loads of laundry your family generates weekly? A freakin’ lot, that’s my guess. If you never go a day without clean socks and your daughter can always find her favorite rainbow shirt, then be sure to thank this cardholder, who not only throws the load in the washer and dryer but also folds it and puts it all away. If laundry tends to pile up and multiply in your home, it’s time to re-deal this card and come up with a new standard before the next cycle begins.", "minimum": "Family members have clean, dry, wearable clothing, linens, and towels when needed, with special-care items handled correctly.", "anticipate": "Notice hamper levels, upcoming uniforms or events, stain treatment needs, and items requiring special washing.", "conceptualize": "Decide load timing, sorting, products, care settings, and whether repair, replacement, or dry cleaning is needed.", "plan": "Keep supplies available and schedule loads so required items are ready on time.", "execute": "Sort, treat, wash, dry, fold or hang, and put away.", "closeLoop": "Ensure nothing is left wet, missing, damaged, or waiting indefinitely to be put away.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fbd66ae6e5eef0bf2789", "source": "Fair Play template", "originalName": "Lawn & Plants", "title": "Plants and Garden", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "If you’ve got a lawn, a backyard or balcony vegetable garden, or just a struggling succulent by your kitchen window, then you know it takes careful CPE to keep your greenery alive, no less thriving. Even if you have a helpful gardener to lend you his or her green thumb, it’s still on you to keep an eye on limp or leggy plants that may need a shot of Miracle-Gro.", "minimum": "Lawn & Plants remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that lawn & plants needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fc178ff0731be3c5e3df", "source": "Fair Play template", "originalName": "Magical Beings (Kids)", "title": "Magical Beings (Kids)", "category": "Magic", "owner": "Adam", "backupOwners": [], "purpose": "By holding this card, you hold the CPE required to keep your child’s dreams and imagination alive. When it comes to the Tooth Fairy, Elf on the Shelf, Santa Claus, the Easter Bunny, the Mensch on a Bench, Saint Patrick’s Day leprechauns, the Switch Witch, or any other magical being that you introduce into your family, believing in the unbelievable disappears quickly. Put in the time and effort today to make the Magic come to life.", "minimum": "Magical Beings is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by magical beings before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for magical beings.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fc4650ff00814bd90818", "source": "Fair Play template", "originalName": "Mail", "title": "Military and VA", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "Does every item in your home have a proper place and is there a system to get them there? Are those that don’t get donated?", "minimum": "x", "anticipate": "x", "conceptualize": "x", "plan": "x", "execute": "x", "closeLoop": "x", "notes": "VA benefits, retirement, Tricare plans", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fc7c0109cc0768e63269", "source": "Fair Play template", "originalName": "Marriage & Romance", "title": "Marriage & Romance", "category": "Magic", "owner": "Adam", "backupOwners": [], "purpose": "A herofail is what one mom called it when her husband scheduled a series of surprise romantic dinners on Thursday nights not realizing that’s when she holds the “transportation (kids)” card for their daughter’s play rehearsals. Her husband’s heart was in the right place, but this card (like all of ’em) takes", "minimum": "Marriage & Romance is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by marriage & romance before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for marriage & romance.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fd594ed94737d015a778", "source": "Fair Play template", "originalName": "Meals (Kids; School Lunch)", "title": "Meals (Kids; School Lunch)", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "If you’re this cardholder, toss the idea of a relaxing night out the window because it’s time to start packing lunch for the kids. Don’t let all the #schoollunch pics on Instagram get you down. Your Fair Play", "minimum": "The relevant meals are available at the agreed times, meet basic nutrition and preference needs, and fit the family's schedule and budget.", "anticipate": "Monitor food inventory, schedules, dietary needs, leftovers, special events, and days when the usual routine will not work.", "conceptualize": "Decide what will be served, how much effort is realistic, and how to balance preferences, nutrition, cost, and time.", "plan": "Choose meals, confirm ingredients, shop or order, thaw or prep, and coordinate timing.", "execute": "Prepare or obtain the meal, serve or pack it, and manage food safety.", "closeLoop": "Store leftovers, reset the kitchen as agreed, and note anything needed for the next meal.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fdfd30aa5a2e295b1343", "source": "Fair Play template", "originalName": "Meals (Weekday Breakfast)", "title": "Meals (Weekday Breakfast)", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "One mom I spoke to lamented that she’s held this card every single day since her kids were old enough to eat solids. Every. Single. Day. Prepare to frequently re-deal full CPE of this nonnegotiable Daily Grind unless serving oatmeal and toast at breakneck speed is your jam. Dishes left in the sink and milk spilled on the counter isn’t “on you” unless you hold the “dishes” and “tidying” cards. Still, be respectful before you zoom out the door.", "minimum": "The relevant meals are available at the agreed times, meet basic nutrition and preference needs, and fit the family's schedule and budget.", "anticipate": "Monitor food inventory, schedules, dietary needs, leftovers, special events, and days when the usual routine will not work.", "conceptualize": "Decide what will be served, how much effort is realistic, and how to balance preferences, nutrition, cost, and time.", "plan": "Choose meals, confirm ingredients, shop or order, thaw or prep, and coordinate timing.", "execute": "Prepare or obtain the meal, serve or pack it, and manage food safety.", "closeLoop": "Store leftovers, reset the kitchen as agreed, and note anything needed for the next meal.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517fe55380f1505324eba7c", "source": "Fair Play template", "originalName": "Meals (Weekday Dinner)", "title": "Meals (Weekday Dinner)", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "If you have never CPE’d dinnertime in a family with kids (particularly young ones), then no words can really do justice to this nightly circus. The ringleader plans a weekly menu, consults the “groceries” cardholder to have the ingredients at home, then cooks, ensures that the food actually gets eaten, and ideally uses this forced family time to have “quality” conversations about everyone’s day. Men: Kudos to you if cooking is one of your domestic contributions, but that’s just one word on this doozy of a card. Hero status isn’t awarded for just pulling out a frying pan.", "minimum": "The relevant meals are available at the agreed times, meet basic nutrition and preference needs, and fit the family's schedule and budget.", "anticipate": "Monitor food inventory, schedules, dietary needs, leftovers, special events, and days when the usual routine will not work.", "conceptualize": "Decide what will be served, how much effort is realistic, and how to balance preferences, nutrition, cost, and time.", "plan": "Choose meals, confirm ingredients, shop or order, thaw or prep, and coordinate timing.", "execute": "Prepare or obtain the meal, serve or pack it, and manage food safety.", "closeLoop": "Store leftovers, reset the kitchen as agreed, and note anything needed for the next meal.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517febacc227553208f8e1c", "source": "Fair Play template", "originalName": "Meals (Weekend)", "title": "Meals (Weekend)", "category": "Home", "owner": "Shared", "backupOwners": [], "purpose": "Why do weekend meals feel more burdensome than weekday meals? Oh, let us count the ways. Maybe it’s because there are twice as many of them than on a school day. Perhaps it’s because they amplify the kitchen mess exponentially. Or because when you make it to Saturday night, you’re still only halfway there. Weekend meals deserve their own card—who wants it? Psst. Serving lunch at 4 p.m. doesn’t cut it unless midday meltdowns are your thing.", "minimum": "The relevant meals are available at the agreed times, meet basic nutrition and preference needs, and fit the family's schedule and budget.", "anticipate": "Monitor food inventory, schedules, dietary needs, leftovers, special events, and days when the usual routine will not work.", "conceptualize": "Decide what will be served, how much effort is realistic, and how to balance preferences, nutrition, cost, and time.", "plan": "Choose meals, confirm ingredients, shop or order, thaw or prep, and coordinate timing.", "execute": "Prepare or obtain the meal, serve or pack it, and manage food safety.", "closeLoop": "Store leftovers, reset the kitchen as agreed, and note anything needed for the next meal.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517ff09eca7522a47c2c6a3", "source": "Fair Play template", "originalName": "Medical & Healthy Living (Kids)", "title": "Medical & Healthy Living (Kids)", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "From stocking up on standard pain relievers and regular checkups at the pediatrician to seeing specialists as needed, your kids’ medical care requires tremendous research, coordination, and time. Healthy living may also include buying vitamins and healthy snacks (in collaboration with the “groceries” cardholder) and inspiring an active lifestyle with family exercise or other heart-pumping activities. This cardholder also takes the lead stocking up on items like hand sanitizer, sunscreen, and bug spray. Exception: You’re off the hook from dealing with “health insurance” unless that’s your card, too.", "minimum": "Children receive appropriate preventive, routine, urgent, and follow-up care, with medications, records, and required forms kept current.", "anticipate": "Track wellness visits, symptoms, prescriptions, referrals, vaccines, school forms, and insurance requirements.", "conceptualize": "Decide the appropriate level of care, provider, timing, and whether school, work, or family schedules must change.", "plan": "Schedule care, gather records and questions, arrange transportation, and prepare insurance or referral information.", "execute": "Attend or coordinate the visit, obtain prescriptions and instructions, and communicate relevant information.", "closeLoop": "Complete referrals, fill medications, submit forms, monitor recovery, and confirm claims or follow-up appointments.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6517ffea3ae2a9f84ae4a865", "source": "Fair Play template", "originalName": "Memories & Photos", "title": "Memories & Photos", "category": "Home", "owner": "Carolyn", "backupOwners": [], "purpose": "God bless those parents who make photo albums every year and who can rest assured that if the basement flooded, all their old photos are scanned and backed up in the cloud. No need to aim that high, but if you hold this card, your family’s lifelong memories are nevertheless in your hands. When a photo collage is needed for “Student of the Week,” it’s time to cue the music . . . and kiss some of your time goodbye. When the boxes of your child’s artwork that you’ve been collecting since kindergarten threaten to take over every wall in your home, it’s time to consult with the “storage” and “organizing” cardholder. Do we keep it all or secretly recycle?", "minimum": "Memories & Photos is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by memories & photos before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for memories & photos.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65180067d64fd62f8159914a", "source": "Fair Play template", "originalName": "Middle-of-the-night Comfort (Kids)", "title": "Middle-of-the-night Comfort (Kids)", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Define “middle of the night” as you see fit, because when daylight savings time hits, you may think of this as the “way too early to be morning” card that leaves you dog-tired and at your wit’s end. (It’s amazing how just one hour can do so much damage!) Bad dreams at 3 a.m., cries of “I can’t sleep!” just when you’re curled up in bed to watch TV, and help with trips to the toilet for that stomach bug going around are all in this cardholder’s hands. As one woman explained it, “When my husband has middle-of-the-night duty, I refer to this as the ‘Don’t call Mom’ card!”", "minimum": "Do your kids have consistent access to a designated parent if middle-of-the-night issues arise?", "anticipate": "", "conceptualize": "MIDDLE-OF-THE-NIGHT COMFORT (DG)", "plan": "·     Making yourself available for your children following bedtime routine, including:\n\n·     Trouble falling asleep\n\n·     Middle of the night feedings\n\n·     Nightterrors\n\n·     Bed-wetting\n\n·     Researching, creating a plan, gathering input from partner about sleep training\n\n‍", "execute": "·     Executing plan for sleep training\n\n‍", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65180119494f59dcb9bc6892", "source": "Fair Play template", "originalName": "Money Manager", "title": "Money Manager", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "If you’re taking the lead on this card, you are intrepid because managing a family’s budget is no small feat.", "minimum": "Household finances support current obligations, agreed goals, emergency needs, and informed joint decisions.", "anticipate": "Track income, spending patterns, taxes, savings goals, debt, benefits, insurance, and major upcoming costs.", "conceptualize": "Evaluate priorities, tradeoffs, risk, and long-term impacts before recommending financial decisions.", "plan": "Maintain budgets, savings strategies, account organization, and scheduled financial reviews.", "execute": "Make agreed transfers, updates, applications, purchases, or account changes.", "closeLoop": "Verify transactions, document decisions, and communicate the current financial picture.", "notes": "everydollar ", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651801663d2c470153c5a37d", "source": "Fair Play template", "originalName": "Morning Routine (Kids)", "title": "Morning Routine (Kids)", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "When was the last time you slept in, pooped in peace, or leisurely read the newspaper while drinking coffee in the morning? Before kids, if you’re holding this card. This cardholder is prepared for daily combat before sunrise with a baby and early still with school-aged kids who often need rousing from bed and help getting dressed, hair and teeth brushed, sunscreen applied, and ushering out the door. At least the “meals (weekday breakfast)” cardholder takes the lead on getting them fed.", "minimum": "Morning Routine is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by morning routine before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for morning routine.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518019ce0b5f16167bbc8ef", "source": "Fair Play template", "originalName": "Moving", "title": "TBD", "category": "Wild", "owner": "Unassigned", "backupOwners": [], "purpose": "There’s a reason why moving is typically on the Top 10 list of hellish events; it can be as stressful as the death of a loved one, divorce, or unemployment. The process of purging, packing, relocating, organizing, storing, and living in disarray is all-consuming, disruptive to your family’s routines, and basically upends your life. Good news: It’s temporary. Bad news: It’s a CPE doozy. Who is better equipped to take the lead?", "minimum": "The family responds to moving with essential safety, communication, financial, logistical, and emotional needs clearly owned.", "anticipate": "Identify urgent risks, deadlines, affected people, available resources, and what may worsen without action.", "conceptualize": "Set priorities, determine what decisions are needed now, and distinguish immediate needs from later work.", "plan": "Create a short action plan, assign help, gather documents, arrange coverage, and establish backup options.", "execute": "Carry out the highest-priority actions, communicate changes, and coordinate professional or family support.", "closeLoop": "Confirm immediate stability, track unresolved items, update the longer-term plan, and reassess household capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651801cb427bb79162539d5a", "source": "Fair Play template", "originalName": "New Job", "title": "New Job", "category": "Wild", "owner": "Adam", "backupOwners": [], "purpose": "When you start a new job, you bring your A game daily, which may mean being the first one in, the last one to leave, working weekends, and doing whatever it takes to make an impression. Ask your partner to step up to the plate by taking some of your household and childcare cards while you concentrate on knocking it out of the park at work.", "minimum": "The family responds to new job with essential safety, communication, financial, logistical, and emotional needs clearly owned.", "anticipate": "Identify urgent risks, deadlines, affected people, available resources, and what may worsen without action.", "conceptualize": "Set priorities, determine what decisions are needed now, and distinguish immediate needs from later work.", "plan": "Create a short action plan, assign help, gather documents, arrange coverage, and establish backup options.", "execute": "Carry out the highest-priority actions, communicate changes, and coordinate professional or family support.", "closeLoop": "Confirm immediate stability, track unresolved items, update the longer-term plan, and reassess household capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651802051874578dc87e43e7", "source": "Fair Play template", "originalName": "Packing & Unpacking (Kids; Local)", "title": "Packing & Unpacking (Kids; Local)", "category": "Out", "owner": "Carolyn", "backupOwners": [], "purpose": "If you use the last diaper in the baby’s diaper bag and don’t replace it, how many diapers will be left the next time you need to change an explosive poop on the go? Exactly. It’s got to be restocked, just as backpacks need to be packed (and unpacked) daily with library books, lunch, homework, water bottles, clothes for after-school activities, and about a million other things you’ll forget if you don’t have a system in place. Bonus duties: packing for sleepovers, packing and replacing the change of clothes in the school cubby as needed, and hitting up the school’s lost and found when only one glove makes it home.", "minimum": "Packing & Unpacking Local) is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by packing & unpacking local) before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for packing & unpacking local).", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "include snacks", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651802b4d513936dd3fb26dd", "source": "Fair Play template", "originalName": "Packing & Unpacking (Travel)", "title": "Packing & Unpacking (Travel)", "category": "Out", "owner": "Carolyn", "backupOwners": [], "purpose": "You’re not alone if packing for a trip with kids leaves you questioning if it’s worth going on the trip at all. It feels like moving the army, only your troops may be too young to pack and carry their own gear. Rookie mistake if just before takeoff you discover the iPad battery is at 1 percent.", "minimum": "Travelers have necessary clothing, medication, documents, devices, and destination-specific items, and belongings are reset after return.", "anticipate": "Review weather, activities, baggage limits, laundry needs, medication, chargers, and special-event requirements.", "conceptualize": "Decide what is essential, what can be shared, and how to avoid overpacking or missing critical items.", "plan": "Create lists, obtain missing items, stage luggage, and schedule laundry or preparation.", "execute": "Pack, label, load, track belongings, unpack, launder, and return items to their places.", "closeLoop": "Confirm nothing important is lost, borrowed items are returned, and travel supplies are replenished.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518201b036ef0c198f02d5f", "source": "Fair Play template", "originalName": "Parents & In-Laws", "title": "Parents & In-Laws", "category": "Caregiving", "owner": "Adam", "backupOwners": [], "purpose": "Whether your parents and/or in-laws live nearby or thousands of miles away, it’s a relationship that can require a fair amount of TLC and CPE. Someone’s got to call them regularly, help them figure out how to turn on their TV with one of their 100-year-old remotes, and invite them to holiday or birthday celebrations. (Or maybe not.)", "minimum": "Parents & In-Laws is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by parents & in-laws before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for parents & in-laws.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518205f2a12c3049b363f8a", "source": "Fair Play template", "originalName": "Partner Coach", "title": "TBD", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Every time you help your loved one with his or her work, you are engaging in the highly invisible work of partner coaching. When you edit an email before your husband sends it to his boss, help him plan an important outing with a client, or lie in bed at night thinking through how he could be considered for a promotion, you are doing the loving and often unrecognized work of “coaching” your partner. This card can be one-sided (that is, a wife helping a husband but not the other way around). The aspiration is to hand off the card more equitably so both partners can benefit from each other’s support and advice.", "minimum": "Partner Coach is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by partner coach before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for partner coach.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651820a7f35f49dc5cbf090d", "source": "Fair Play template", "originalName": "Pets", "title": "Pets", "category": "Caregiving", "owner": "Adam", "backupOwners": [], "purpose": "When you got your pet, the deal was that the kids would take on a lot of the responsibility. Ha! Now, here you are with a bundle of furry love . . . and a bundle of work. Your to-do list depends on what kind of animal you have, but across the board this cardholder typically CPEs food, veterinary appointments, grooming, pet supplies, finding a pet sitter for when you’re away, and the least fun but most important—taking out the kitty litter or being on the ready with poop bag in hand.", "minimum": "Pets have consistent food, water, exercise, hygiene, preventive care, medication, and safe supervision.", "anticipate": "Monitor supplies, health changes, appointments, medication refills, grooming, travel needs, and environmental risks.", "conceptualize": "Decide when home care is sufficient, when veterinary care is needed, and what routine best fits the pet and household.", "plan": "Maintain supplies, schedule care, arrange boarding or sitters, and keep records accessible.", "execute": "Feed, clean, exercise, medicate, transport, and attend appointments.", "closeLoop": "Confirm recovery or follow-up, replenish supplies, update records, and communicate important changes.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65182101237ed7687a9d2398", "source": "Fair Play template", "originalName": "Points, Miles & Coupons", "title": "Points, Miles & Coupons", "category": "Out", "owner": "Adam", "backupOwners": [], "purpose": "Do you know if you have enough airline miles to fly free on your next trip? And also bring your partner along for the ride? This cardholder keeps track of miles, credit card points, coupons, and all those big money savers. Thoughtful CPE of this card is a must—getting that awesome “buy one, get three free” deal only happens when you have your coupon stash organized and in hand at the checkout line.", "minimum": "Points, Miles & Coupons is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by points, miles & coupons before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for points, miles & coupons.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65182130c93f0689a975e27b", "source": "Fair Play template", "originalName": "Returns & Store Credit", "title": "Returns & Store Credit", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "If it seems as if there’s always something you’ve bought that needs to be returned or exchanged—typically without the receipt and on the opposite side of town—then this cardholder will be quite busy. Store credit? Gift cards from your mother-in-law? Sure, they were for your kids, but who’s gonna know if you used one to buy those cute shoes on sale?", "minimum": "Did you return the items during the allotted store policy window? Do you know where your credits are?", "anticipate": "", "conceptualize": "RETURNS & STORE CREDITS", "plan": "- Keeping track of items that need to be returned- Figuring out store return policy", "execute": "- Returning items (within store policy window)- Donating or reselling items (if expired)- Purchasing items with store credits (within store policy window)- Managing gift cards and give to other cardholders such as “clothes and accessories (kids)” when appropriate for use", "closeLoop": "", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65182170792680acb0a211d0", "source": "Fair Play template", "originalName": "School Breaks (Kids; Non-Summer)", "title": "School Breaks (Kids; Non-Summer)", "category": "Out", "owner": "Adam", "backupOwners": [], "purpose": "For your kids’ non-summer vacations like winter and spring break, you have plenty of advance notice to plan. Still, don’t wait too long. The holidays creep up quickly. But when it comes to parent-teacher conferences, school construction, snow days, smoke days, and every other scenario that has you scrambling for childcare, this cardholder must be able to pivot quickly and CPE like a pro.", "minimum": "School Breaks Non-Summer) is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by school breaks non-summer) before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for school breaks non-summer).", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651821beb07d7d6c6d1342fc", "source": "Fair Play template", "originalName": "School Breaks (Kids; Summer)", "title": "School Breaks (Kids; Summer)", "category": "Out", "owner": "Adam", "backupOwners": [], "purpose": "The CPEer of this card may begin researching options for camps or other summer activities months in advance. This workload lasts until the minute all the required forms and fees are taken care of and every day is covered (up to 90 days, but who’s counting?).", "minimum": "School Breaks Summer) is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by school breaks summer) before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for school breaks summer).", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651821ed8216e221f787ee5f", "source": "Fair Play template", "originalName": "School Forms (Kids)", "title": "School Forms (Kids)", "category": "Out", "owner": "Carolyn", "backupOwners": [], "purpose": "Every freakin’ form from school that requires review, including your child’s enrollment forms, notices for overdue library books, and permission slips for field trips is now in your hands. School forms may come via email (check your spam folder), crumpled up in your child’s backpack, on a school website, or via the school portal, which you’re supposed to know how to log onto and navigate by now but remains one of life’s mysteries. School forms are enough for this cardholder; direct contact with teachers is the responsibility of the “teacher communication” cardholder.", "minimum": "Required school, activity, health, permission, enrollment, and emergency forms are accurate and submitted by the deadline.", "anticipate": "Monitor school communications and recurring annual, trip, sports, medical, and enrollment requirements.", "conceptualize": "Determine what information, signatures, payments, records, or decisions are required.", "plan": "Gather documents, coordinate with the other parent or providers, and track due dates.", "execute": "Complete, sign, pay, upload, or deliver the forms.", "closeLoop": "Confirm receipt and acceptance and resolve missing information or corrections.", "notes": "puts stuff on calendar, includes Step Up Scholarship and paying tuition", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651822a340b137f942c9123d", "source": "Fair Play template", "originalName": "School Service (Kids)", "title": "TBD", "category": "Caregiving", "owner": "Unassigned", "backupOwners": [], "purpose": "When you agreed to chaperone the museum field trip, it seemed like a worthwhile opportunity to spend time with your child and his classmates. Which it was . . . until you found yourself sitting at the back of a school bus trying not to puke. This card pulls you into a time-sucking vortex that includes reading through a chain of 43 emails (was “reply all” really necessary?), school-sponsored lectures (another one?), and baking cupcakes (nut free?). And what’s up with schools requesting volunteers to be class “moms”? Dads make excellent class parents, too, ya know.", "minimum": "The child's participation is appropriately selected, registered, funded, scheduled, supplied, and supported through completion.", "anticipate": "Track registration windows, eligibility, schedules, fees, equipment, transportation, conflicts, and the child's interest or stress level.", "conceptualize": "Evaluate fit, benefit, cost, time commitment, family capacity, and whether continued participation makes sense.", "plan": "Register, pay, calendar events, obtain supplies, arrange transportation, and communicate with leaders or teachers.", "execute": "Get the child where needed, provide required items, respond to changes, and support participation.", "closeLoop": "Confirm attendance and obligations, handle forms or reimbursements, return equipment, and reassess future participation.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651822f584feda302ce3ab60", "source": "Fair Play template", "originalName": "School Transitions (Kids)", "title": "TBD", "category": "Caregiving", "owner": "Unassigned", "backupOwners": [], "purpose": "If your child needs to apply to a new school (kindergarten through college), this card may include tours, filling out applications, writing essays, ordering transcripts, test preps for the ACT and SAT, and more. And that work only begins after you’ve completed loads of research about where to apply, considered what might be the best fit for your child, and created your best chances to get in. (Is the lottery really just a lottery? Better find out.)", "minimum": "The child's participation is appropriately selected, registered, funded, scheduled, supplied, and supported through completion.", "anticipate": "Track registration windows, eligibility, schedules, fees, equipment, transportation, conflicts, and the child's interest or stress level.", "conceptualize": "Evaluate fit, benefit, cost, time commitment, family capacity, and whether continued participation makes sense.", "plan": "Register, pay, calendar events, obtain supplies, arrange transportation, and communicate with leaders or teachers.", "execute": "Get the child where needed, provide required items, respond to changes, and support participation.", "closeLoop": "Confirm attendance and obligations, handle forms or reimbursements, return equipment, and reassess future participation.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518235aa50fac0cbd72db9b", "source": "Fair Play template", "originalName": "Self-Care (Player 1)", "title": "Self-Care and Health Adam", "category": "Caregiving", "owner": "Adam", "backupOwners": [], "purpose": "Each of you gets a self-care card regardless of how many children and other responsibilities you have. For some, a daily multivitamin, a good book, and a hot bath fit the bill. Others may have weekly therapy or wellness appointments, and also set aside regular time to exercise. No guilt or shame allowed. Take this important time for you and allow your partner to do the same.", "minimum": "Protected personal time and relationships receive enough attention to support health, identity, connection, and sustainable family participation.", "anticipate": "Notice signs of depletion, isolation, scheduling conflicts, and opportunities that require advance planning.", "conceptualize": "Decide what form of time, support, activity, or connection would be restorative and realistic.", "plan": "Reserve time, arrange coverage, budget as needed, and communicate the plan without waiting for a crisis.", "execute": "Use the protected time and complete any arrangements or communication involved.", "closeLoop": "Return agreed responsibilities to normal, reflect on whether the need was met, and schedule the next opportunity when useful.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651823b8032b28f5d6e6abbb", "source": "Fair Play template", "originalName": "Self-Care (Player 2)", "title": "Self-Care and Health Carolyn", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "Each of you gets a self-care card regardless of how many children and other responsibilities you have. For some, a daily multivitamin, a good book, and a hot bath fit the bill. Others may have weekly therapy or wellness appointments, and also set aside regular time to exercise. No guilt or shame allowed. Take this important time for you and allow your partner to do the same.", "minimum": "Protected personal time and relationships receive enough attention to support health, identity, connection, and sustainable family participation.", "anticipate": "Notice signs of depletion, isolation, scheduling conflicts, and opportunities that require advance planning.", "conceptualize": "Decide what form of time, support, activity, or connection would be restorative and realistic.", "plan": "Reserve time, arrange coverage, budget as needed, and communicate the plan without waiting for a crisis.", "execute": "Use the protected time and complete any arrangements or communication involved.", "closeLoop": "Return agreed responsibilities to normal, reflect on whether the need was met, and schedule the next opportunity when useful.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518242981ee66e999617d03", "source": "Fair Play template", "originalName": "Serious Illness", "title": "Serious Illness", "category": "Wild", "owner": "Shared", "backupOwners": [], "purpose": "When a child falls ill, the implications can be life changing. If you are managing someone else’s illness, it can require hours of research, doctors’ appointments, treatment plans, and medication monitoring. Thankfully, you can ask your partner to step in and support you. If, however, it’s you or your spouse who is ill, the healthier person may need to take on more cards in addition to holding this Wild card. Rather than allowing resentment or fear to build, ask for what you need and re-deal as circumstances change.", "minimum": "The family responds to serious illness with essential safety, communication, financial, logistical, and emotional needs clearly owned.", "anticipate": "Identify urgent risks, deadlines, affected people, available resources, and what may worsen without action.", "conceptualize": "Set priorities, determine what decisions are needed now, and distinguish immediate needs from later work.", "plan": "Create a short action plan, assign help, gather documents, arrange coverage, and establish backup options.", "execute": "Carry out the highest-priority actions, communicate changes, and coordinate professional or family support.", "closeLoop": "Confirm immediate stability, track unresolved items, update the longer-term plan, and reassess household capacity.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518247b006b34ecca1c3b1e", "source": "Fair Play template", "originalName": "Showing Up & Participating (Kids)", "title": "Showing Up & Participating (Kids)", "category": "Magic", "owner": "Shared", "backupOwners": [], "purpose": "One dad admits that he spent nearly a month complaining about the daddy/daughter dance at school, dreading everything from the small talk with other dads to the awkwardness of busting out his moves. Ultimately he went, and it turned out to be pure Magic for both him and his growing-up-too-fast fourth grader. You’ve got to show up for and participate in your child’s events, big and small, for the Magic to happen. Re-deal this card frequently to make sure it does.", "minimum": "Showing Up & Participating is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by showing up & participating before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for showing up & participating.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651827f1b5ce3db432a8ada3", "source": "Fair Play template", "originalName": "Social Plans (Couples)", "title": "TBD", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "In theory, it’s as simple as texting your friends to get together, picking a date/time/place, and showing up. But that’s not how it works in real life, and certainly not how it works after having kids. For starters, you want your partner’s buy-in for who you’re getting together with, and you’ll need to get a babysitter, so consult with the “childcare helpers” cardholder. Then, syncing calendars (pre-bedtime? after the championship game?) will make you question if it’s really worth the effort. If you actually make it out the door without cancelling, you have earned a bonus cocktail.", "minimum": "Social Plans (Couples) is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by social plans (couples) before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for social plans (couples).", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651828693e1d86e5e7d024d9", "source": "Fair Play template", "originalName": "Special Needs & Mental Health (Kids)", "title": "Special Needs & Mental Health (Kids)", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "Obviously this card needs to be CPE’d with tremendous care if your child has special needs or mental health issues. From identifying the problem to finding the best resources, scheduling appointments, monitoring medication,", "minimum": "Each child's developmental, emotional, behavioral, and learning needs are supported consistently across home, school, and providers.", "anticipate": "Notice changes, triggers, medication or therapy needs, school concerns, accommodation deadlines, and signs of overload.", "conceptualize": "Interpret patterns, decide what support is appropriate, and balance the child's needs with family capacity.", "plan": "Coordinate evaluations, providers, school supports, records, appointments, and home strategies.", "execute": "Attend meetings, implement agreed supports, obtain services, and communicate with the child and care team.", "closeLoop": "Monitor effectiveness, update plans, document outcomes, and schedule reassessment when needed.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651828a547317a4ebe7f78cd", "source": "Fair Play template", "originalName": "Spirituality", "title": "Spirituality", "category": "Magic", "owner": "Adam", "backupOwners": [], "purpose": "This card looks and feels different to everyone—perhaps even within your own home—so all the more reason you should consult your partner in the", "minimum": "Spirituality remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that spirituality needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651828e7c081a32004c80416", "source": "Fair Play template", "originalName": "Storage, Garage & Seasonal Items", "title": "Storage, Garage & Seasonal Items", "category": "Home", "owner": "Adam", "backupOwners": [], "purpose": "If you have a storage unit or a garage, do you have any idea what’s inside it? If not, now is the time to get it organized and have a CPE plan in place before someone asks, “Honey, where’s Zach’s sleeping bag? He has a sleepover tonight.”", "minimum": "Storage, Garage & Seasonal Items remains safe, functional, reasonably organized, and supplied, with maintenance or replacement handled before avoidable failure.", "anticipate": "Monitor condition, service intervals, warranties, supplies, seasonal needs, and signs that storage, garage & seasonal items needs attention.", "conceptualize": "Determine urgency, repair versus replacement, budget, specifications, and whether professional help is appropriate.", "plan": "Research options, obtain quotes or parts, schedule work, and prepare access or backup arrangements.", "execute": "Complete or oversee the purchase, repair, setup, maintenance, or organization.", "closeLoop": "Test the result, retain records, dispose of old items properly, and schedule future maintenance.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-651829299a7a0b80d29fef8d", "source": "Fair Play template", "originalName": "Teacher Communication (Kids)", "title": "Teacher Communication (Kids)", "category": "Caregiving", "owner": "Carolyn", "backupOwners": [], "purpose": "Every teacher and child is different, so this cardholder’s responsibility could be as minimal as showing up to the parent-teacher conference once or twice a year. Or your communication may involve a weekly email exchange or speaking daily and face-to-face to discuss homework and your child’s unique learning needs. As the CPEer, it’s up to you to proactively keep tabs on your kiddos in their school environment to identify potential challenges and work with their teachers to help them thrive.", "minimum": "Important school information is received, understood, answered when needed, and shared with the appropriate family members.", "anticipate": "Monitor messages, grade portals, newsletters, behavior concerns, upcoming conferences, and requests from teachers.", "conceptualize": "Assess importance, decide whether a response or meeting is needed, and identify the desired outcome.", "plan": "Gather context, questions, records, and schedules before communicating.", "execute": "Respond, attend meetings, coordinate actions, and communicate respectfully.", "closeLoop": "Document agreements, complete requested actions, and follow up if the issue remains unresolved.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-6518298a146746bb4b7d0208", "source": "Fair Play template", "originalName": "Thank You Notes", "title": "TBD", "category": "Magic", "owner": "Unassigned", "backupOwners": [], "purpose": "Why would the dreaded task of writing thank-you notes be considered Magic? Because thank-you notes are an opportunity to express gratitude to people who inspire you to feel it. If you have family dinner with friends, you might send an email letting them know how wonderful it was to spend time together. When a colleague delivers a huge bag of hand-me-downs for your kids, that thoughtfulness merits a note. Imagine a life where sleep-deprived postpartum moms are not saddled with writing thank-you notes for baby gifts. That can be your reality, as either partner is capable of CPEing this card.", "minimum": "Important people are acknowledged in a thoughtful, timely way that fits the relationship, occasion, budget, and family values.", "anticipate": "Track occasions, preferences, addresses, deadlines, shipping time, and people who may otherwise be overlooked.", "conceptualize": "Decide the appropriate gesture, message, budget, and level of personalization.", "plan": "Create the list, obtain addresses, purchase or make items, and schedule delivery or mailing.", "execute": "Complete, wrap, write, send, deliver, or arrange the gesture.", "closeLoop": "Confirm receipt when appropriate, manage returns, and update notes or contact information.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65182a02ae2e2a899b57fcd3", "source": "Fair Play template", "originalName": "Tidying Up, Organizing & Donations", "title": "Tidying Up, Organizing & Donations", "category": "Home", "owner": "Shared", "backupOwners": [], "purpose": "This never-ending work includes making beds, putting toys away, finding the Legos under the couch (preferably before you buy a whole new set), and wrapping up the half a banana sitting on the counter before fruit flies infest your home. This 784card is a hot-button issue for many couples who often disagree on a standard for “tidy,” so before one of you claims it, get specific about how long you can both live with the toy closet that’s bursting at the seams, all the random crap accumulating under the stairwell, and the donation bags that have been sitting in the trunk of the family car for months. Unless your aspiration is to star on Hoarders (and your partner agrees to costar), you may want to binge a few episodes of Tidying Up with Marie Kondo.", "minimum": "Tidying Up, Organizing & Donations is handled reliably, on time, and to the household's agreed standard without requiring the other partner to manage or repeatedly remind the owner.", "anticipate": "Notice upcoming needs, deadlines, changes, shortages, risks, and people affected by tidying up, organizing & donations before they become urgent.", "conceptualize": "Decide what a successful outcome looks like, what choices are required, what constraints apply, and whether help or input is needed.", "plan": "Create the schedule, list, budget, reservations, purchases, communication, and backup arrangements needed for tidying up, organizing & donations.", "execute": "Complete or coordinate the practical actions, communication, transportation, purchasing, and problem-solving involved.", "closeLoop": "Confirm the outcome is complete, communicate anything others need to know, store records or supplies, and schedule any follow-up.", "notes": "", "deleted": false, "createdAt": "", "updatedAt": ""}, {"id": "fp-65182a712e5e88d3358dcb28", "source": "Fair Play template", "originalName": "Transportation (Kids)", "title": "TBD", "category": "Out", "owner": "Unassigned", "backupOwners": [], "purpose": "Full. Time. Job. Whether your kids take a bus, carpool, walk, or have a chauffeur (aka you), managing their transportation can be a beast. On any given day, you could be spending countless hours transporting your kids to school or coordinating with those who are pitching in with drop-offs and pickups. Add on getting them to and from playdates, after-school activities, camp, and every other place they need to be seven days a week and we’ve come full circle: Full. Time. Job. Note! The “transportation (kids)” card pairs with “birthday celebrations (other kids),” “friendships and social media (kids),” “extracurricular (non-sports),” and “extracurricular (sports).” Meaning, if you hold any of the aforementioned cards and they involve giving your kid a ride, you are responsible for transporting or arranging for transportation to and from those
